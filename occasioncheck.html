<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0b">
<title>OccasionCheck</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#000; color:#f2f2f7; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display',system-ui,sans-serif; padding:18px 16px 48px; -webkit-font-smoothing:antialiased; }
  .wrap { max-width:540px; margin:0 auto; }

  header { display:flex; align-items:center; gap:13px; margin-bottom:20px; padding-top:4px; }
  .logo { width:44px; height:44px; border-radius:12px; background:linear-gradient(160deg,#0a84ff,#0060df); display:grid; place-items:center; flex-shrink:0; box-shadow:0 4px 14px rgba(10,132,255,.35); }
  .logo svg { width:23px; height:23px; stroke:#fff; }
  h1 { font-size:24px; font-weight:700; letter-spacing:-.02em; }
  .tagline { font-size:13px; color:#8e8e93; margin-top:1px; }

  .searchRow { display:flex; gap:9px; margin-bottom:14px; }
  .plateWrap { flex:1; display:flex; align-items:stretch; background:#fff; border-radius:12px; overflow:hidden; }
  .plateFlag { background:#0a3d91; color:#fff; font-weight:700; font-size:12px; padding:0 11px; display:grid; place-items:center; letter-spacing:.05em; }
  #plate { flex:1; border:none; outline:none; padding:13px 12px; font-size:19px; font-weight:700; letter-spacing:.1em; color:#111; text-transform:uppercase; width:100%; }
  #plate::placeholder { color:#aeaeb2; font-weight:500; }
  .btn { display:flex; align-items:center; justify-content:center; gap:7px; background:#0a84ff; color:#fff; border:none; border-radius:12px; padding:0 20px; font-size:16px; font-weight:600; cursor:pointer; }
  .btn:active { background:#0060df; }
  .btn svg { width:18px; height:18px; stroke:#fff; }

  .demos { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:18px; }
  .demoChip { background:#1c1c1e; color:#0a84ff; font-size:13px; font-weight:500; padding:7px 13px; border-radius:18px; cursor:pointer; }
  .demoChip:active { background:#2c2c2e; }
  .demoLabel { font-size:12px; color:#8e8e93; width:100%; margin-bottom:3px; }

  .msg { display:flex; align-items:center; gap:9px; border-radius:13px; padding:14px 16px; font-size:14px; line-height:1.45; }
  .msg.error { background:#2c1517; color:#ff9aa0; }
  .msg.info { background:#1c1c1e; color:#aeaeb2; }
  .msg svg { width:18px; height:18px; flex-shrink:0; }

  .report { display:flex; flex-direction:column; gap:16px; margin-top:6px; }

  /* koopadvies-kaart */
  .adviceCard { border-radius:16px; padding:18px; border:1px solid; }
  .adviceCard.ok { background:linear-gradient(160deg,#0f2e1a,#0c2417); border-color:#1f5c34; }
  .adviceCard.warn { background:linear-gradient(160deg,#2e2613,#241e0f); border-color:#5c4a1f; }
  .adviceCard.danger { background:linear-gradient(160deg,#2c1517,#240f11); border-color:#5c1f1f; }
  .adviceTop { display:flex; align-items:center; gap:11px; }
  .adviceTop svg { width:28px; height:28px; flex-shrink:0; }
  .adviceCard.ok .adviceTop { color:#30d158; }
  .adviceCard.warn .adviceTop { color:#ffd426; }
  .adviceCard.danger .adviceTop { color:#ff453a; }
  .adviceLabel { font-size:26px; font-weight:800; letter-spacing:-.02em; }
  .adviceSub { font-size:13.5px; color:#c7c7cc; line-height:1.5; margin-top:8px; }
  .priceBand { margin-top:13px; padding:12px 14px; background:rgba(255,255,255,0.06); border-radius:11px; }
  .priceBandMain { display:flex; justify-content:space-between; align-items:baseline; }
  .priceBandMain span { font-size:13px; color:#c7c7cc; }
  .priceBandMain strong { font-size:19px; font-weight:700; }
  .priceBandSub { font-size:11.5px; color:#8e8e93; margin-top:4px; }
  .adviceList { margin-top:12px; display:flex; flex-direction:column; gap:6px; }
  .adviceItem { display:flex; align-items:flex-start; gap:9px; font-size:13.5px; line-height:1.4; color:#e8e8ea; }
  .adviceItem span { font-weight:800; width:14px; flex-shrink:0; text-align:center; }
  .adviceItem.plus span { color:#30d158; }
  .adviceItem.min span { color:#ff9f0a; }
  .adviceHint { font-size:12px; color:#8e8e93; margin-top:12px; line-height:1.5; font-style:italic; }

  /* model foto */
  .carPhoto { width:100%; border-radius:14px; overflow:hidden; background:#1c1c1e; height:170px; position:relative; display:flex; align-items:center; justify-content:center; }
  .carPhoto img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; }
  .carPhotoPlaceholder { width:54px; height:54px; }

  .reportHead { display:flex; justify-content:space-between; align-items:flex-start; gap:14px; flex-wrap:wrap; }
  .plateBadge { display:inline-flex; align-items:center; gap:7px; background:#fff; color:#111; font-weight:700; font-size:14px; border-radius:7px; overflow:hidden; margin-bottom:9px; padding-right:11px; letter-spacing:.08em; }
  .plateBadge .f { background:#0a3d91; color:#fff; font-size:11px; padding:5px 7px; }
  .carTitle { font-size:26px; font-weight:700; letter-spacing:-.02em; line-height:1.12; }
  .carSub { font-size:14px; color:#8e8e93; margin-top:4px; }
  .valueBox { display:flex; flex-direction:column; align-items:flex-end; background:#1c1c1e; border-radius:14px; padding:11px 15px; }
  .valueBox .l { font-size:11px; color:#8e8e93; }
  .valueBox .n { font-size:21px; font-weight:700; color:#0a84ff; margin:2px 0; }
  .valueBox .s { font-size:10px; color:#636366; }

  .flag { display:flex; align-items:center; gap:11px; border-radius:13px; padding:13px 15px; font-size:14px; line-height:1.4; }
  .flag svg { width:18px; height:18px; flex-shrink:0; }
  .flag.ok { background:#13301d; color:#5fd788; }
  .flag.warn { background:#2e2613; color:#ffd426; }
  .flag.danger { background:#2c1517; color:#ff6961; }

  .apkBlock { display:flex; align-items:center; gap:12px; border-radius:14px; padding:14px 16px; }
  .apkBlock svg { width:20px; height:20px; flex-shrink:0; }
  .apkBlock .d { font-size:13px; color:#8e8e93; margin-top:2px; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
  .spec { display:flex; align-items:center; gap:11px; background:#1c1c1e; border-radius:14px; padding:13px 14px; }
  .spec svg { width:17px; height:17px; stroke:#0a84ff; flex-shrink:0; }
  .spec .l { font-size:11.5px; color:#8e8e93; margin-bottom:2px; }
  .spec .v { font-size:14px; font-weight:600; }

  .costBlock, .valueBlock { background:#1c1c1e; border-radius:16px; padding:16px 18px; }
  .totaalRow { border-top:1px solid #38383a; margin-top:4px; padding-top:12px; font-size:16px; }
  .totaalRow strong { color:#30d158; }
  .depReadout { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
  .depReadout .depAge { font-size:13px; color:#8e8e93; }
  .depReadout .depVal { font-size:20px; font-weight:700; color:#0a84ff; }
  #depDot { cursor:grab; }
  #depChart:active #depDot { cursor:grabbing; }
  .provRow { display:flex; justify-content:space-between; align-items:center; padding:5px 0 11px; font-size:14px; gap:12px; }
  .provRow select { background:#2c2c2e; color:#f2f2f7; border:none; border-radius:9px; padding:9px 11px; font-size:14px; font-weight:500; -webkit-appearance:none; appearance:none; min-width:140px; }
  .numInput { background:#2c2c2e; color:#f2f2f7; border:none; border-radius:9px; padding:9px 11px; font-size:14px; font-weight:500; width:140px; text-align:right; outline:none; }
  .numInput::placeholder { color:#636366; }
  .numInput:focus { box-shadow:0 0 0 2px #0a84ff; }
  .compIntro { font-size:13px; color:#8e8e93; line-height:1.5; margin-bottom:13px; }
  .gaspedaalBtn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; margin-bottom:14px; background:#1c1c1e; color:#0a84ff; border:1px solid #0a84ff; border-radius:11px; padding:12px; font-size:14px; font-weight:600; text-decoration:none; }
  .gaspedaalBtn:active { background:#0a1f33; }
  .gaspedaalBtn svg { width:17px; height:17px; }
  .compLabel { font-size:12.5px; color:#8e8e93; margin:11px 0 5px; }
  .addBtn { background:transparent; color:#0a84ff; border:1px dashed #48484a; border-radius:10px; padding:11px; font-size:14px; font-weight:500; width:100%; cursor:pointer; margin-top:9px; }
  .addBtn:active { background:#2c2c2e; }
  .costHead { display:flex; align-items:center; gap:9px; font-weight:600; font-size:17px; margin-bottom:12px; letter-spacing:-.01em; }
  .costHead svg { width:18px; height:18px; stroke:#0a84ff; }
  .costRow { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-top:1px solid #2c2c2e; font-size:14px; }
  .disclaimer { font-size:11.5px; color:#636366; margin-top:12px; line-height:1.5; }

  .spin { animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .demoTag { display:inline-block; background:#3a2c4e; color:#d8b4fe; font-size:10px; font-weight:600; padding:2px 7px; border-radius:5px; margin-left:8px; vertical-align:middle; letter-spacing:.03em; }
  @media(max-width:480px){ .searchRow{flex-wrap:wrap} .btn{flex:1;padding:12px} }

  .pdfBtn { display:flex; align-items:center; justify-content:center; gap:9px; width:100%; margin-top:6px; background:#0a84ff; color:#fff; border:none; border-radius:13px; padding:15px; font-size:16px; font-weight:600; cursor:pointer; }
  .pdfBtn:active { background:#0060df; }
  .pdfBtn svg { width:18px; height:18px; }
  .printHint { font-size:11.5px; color:#6b7280; text-align:center; margin-top:8px; line-height:1.5; }
  .print-only { display:none; }

  /* ── Print / PDF weergave ── */
  @media print {
    body { background:#fff !important; color:#111 !important; padding:0 16px; }
    .no-print, .searchRow, .demos, header .tagline { display:none !important; }
    header { margin-bottom:8px; }
    h1 { color:#111 !important; }
    .report { gap:12px; }
    .costBlock, .valueBlock, .spec, .apkBlock, .flag, .plateBadge {
      background:#fff !important; border:1px solid #ccc !important; color:#111 !important;
      -webkit-print-color-adjust:exact; print-color-adjust:exact;
    }
    .carTitle, .carSub, .costHead, .spec .v, .spec .l, .costRow, .disclaimer, .compLabel, .compIntro { color:#111 !important; }
    .spec svg, .costHead svg { stroke:#444 !important; }
    .numInput, .addBtn, .provRow select { display:none !important; }
    .print-only { display:inline !important; color:#111 !important; }
    .demoTag { display:none !important; }
    .flag { border-left:4px solid #888 !important; }
    .carPhoto { max-height:200px; border:1px solid #ccc !important; }
    .valueBlock svg { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .totaalRow strong, .valueBox .n { color:#111 !important; }
    a, .pdfBtn { display:none !important; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.5"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.5 2.8C1.4 11.3 1 12.1 1 13v3c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg></div>
    <div>
      <h1>OccasionCheck</h1>
      <div class="tagline">Voer een kenteken in, krijg het hele plaatje.</div>
    </div>
  </header>

  <div class="searchRow">
    <div class="plateWrap">
      <div class="plateFlag">NL</div>
      <input id="plate" placeholder="XX-123-X" maxlength="8" autocomplete="off" autocapitalize="characters" spellcheck="false">
    </div>
    <button class="btn" onclick="lookup()" id="btn">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <span id="btnText">Check</span>
    </button>
  </div>

  <div class="demos">
    <span class="demoLabel">Demo-auto's (werken altijd):</span>
  </div>

  <div id="output">
    <div class="msg info">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
      <span>Tik een demo-auto hierboven, of typ een echt kenteken. Online werkt elk Nederlands kenteken via de RDW.</span>
    </div>
  </div>
</div>

<script>
const RDW_MAIN = "https://opendata.rdw.nl/resource/m9d7-ebf2.json";
const RDW_FUEL = "https://opendata.rdw.nl/resource/8ys7-d773.json";
const RDW_GEARBOX = "https://opendata.rdw.nl/resource/r7cw-67gs.json"; // Versnellingsbak Uitvoering
const RDW_DEFECTS = "https://opendata.rdw.nl/resource/a34c-vvps.json"; // Geconstateerde Gebreken (APK)
const RDW_DEFECT_DESC = "https://opendata.rdw.nl/resource/hx2c-gt7k.json"; // Gebreken (omschrijvingen)
const RDW_ODO = "https://opendata.rdw.nl/resource/tcwd-fkw7.json";     // Tellerstandoordeel
const RDW_RECALL = "https://opendata.rdw.nl/resource/9levknx.json";   // (placeholder; terugroep koppeling)
let LAST = null; // laatst opgehaalde voertuig, voor herberekening

// ── Demo-data: realistische voorbeelden zodat het offline werkt ──
const DEMO = {
  "GTSV21": {
    main: { kenteken:"GTSV21", merk:"VOLKSWAGEN", handelsbenaming:"GOLF", inrichting:"hatchback", eerste_kleur:"Grijs",
      datum_eerste_toelating:"20180312", vervaldatum_apk:"20260901", massa_ledig_voertuig:"1240",
      aantal_deuren:"5", aantal_zitplaatsen:"5", catalogusprijs:"28900", wam_verzekerd:"Ja", tenaamstellen_mogelijk:"Ja" },
    fuel: { brandstof_omschrijving:"Benzine", nettomaximumvermogen:"110", aantal_cilinders:"4",
      cilinderinhoud:"1498", brandstofverbruik_gecombineerd:"5.6", co2_uitstoot_gecombineerd:"128" },
    gearbox: { type:"Handgeschakeld", aantal:"6", raw:"M" },
    apk: { keuringen:5, totaalGebreken:3, perKeuring:0.6, laatsteKeuring:"20250901" },
    odo: { oordeel:"Logisch", datum:"20250901" }, recalls:null
  },
  "RJ482K": {
    main: { kenteken:"RJ482K", merk:"BMW", handelsbenaming:"320I", inrichting:"sedan", eerste_kleur:"Zwart",
      datum_eerste_toelating:"20060718", vervaldatum_apk:"20251015", massa_ledig_voertuig:"1450",
      aantal_deuren:"4", aantal_zitplaatsen:"5", catalogusprijs:"41500", wam_verzekerd:"Ja", tenaamstellen_mogelijk:"Ja" },
    fuel: { brandstof_omschrijving:"Benzine", nettomaximumvermogen:"110", aantal_cilinders:"4",
      cilinderinhoud:"1995", brandstofverbruik_gecombineerd:"7.9", co2_uitstoot_gecombineerd:"189" },
    gearbox: { type:"Automaat", aantal:"6", raw:"A" }
  },
  "HX991P": {
    main: { kenteken:"HX991P", merk:"TESLA", handelsbenaming:"MODEL 3", inrichting:"sedan", eerste_kleur:"Wit",
      datum_eerste_toelating:"20220505", vervaldatum_apk:"20260505", massa_ledig_voertuig:"1612",
      aantal_deuren:"4", aantal_zitplaatsen:"5", catalogusprijs:"52000", wam_verzekerd:"Ja", tenaamstellen_mogelijk:"Ja" },
    fuel: { brandstof_omschrijving:"Elektriciteit", nettomaximumvermogen:"208", aantal_cilinders:"0",
      cilinderinhoud:"", brandstofverbruik_gecombineerd:"", co2_uitstoot_gecombineerd:"0" },
    gearbox: { type:"Automaat", aantal:"1", raw:"A" }
  },
  "84TKDL": {
    main: { kenteken:"84TKDL", merk:"OPEL", handelsbenaming:"ASTRA", inrichting:"stationwagen", eerste_kleur:"Blauw",
      datum_eerste_toelating:"20090922", vervaldatum_apk:"20251130", massa_ledig_voertuig:"1320",
      aantal_deuren:"5", aantal_zitplaatsen:"5", catalogusprijs:"26400", wam_verzekerd:"Nee", tenaamstellen_mogelijk:"Ja" },
    fuel: { brandstof_omschrijving:"Diesel", nettomaximumvermogen:"81", aantal_cilinders:"4",
      cilinderinhoud:"1686", brandstofverbruik_gecombineerd:"4.8", co2_uitstoot_gecombineerd:"129" },
    gearbox: null,
    apk: { keuringen:8, totaalGebreken:19, perKeuring:2.4, laatsteKeuring:"20251130" },
    odo: { oordeel:"Onlogisch", datum:"20251130" }, recalls:{ aantal:1 }
  }
};

const cleanPlate = s => s.toUpperCase().replace(/[^A-Z0-9]/g,"");
const fmtDate = s => (!s||s.length!==8) ? "—" : `${s.slice(6,8)}-${s.slice(4,6)}-${s.slice(0,4)}`;

// ── CarImages API: zet hier jouw gratis sleutel (begint met ci_) ──
// Haal 'm op bij https://carimagesapi.com/register en plak hieronder.
const CARIMAGES_KEY = "ci_your_key";  // <-- VERVANG door je eigen sleutel

// Laadt het CarImages-scriptje dat de modelfoto's automatisch invult.
// Doet niets zolang de sleutel nog op de voorbeeldwaarde staat.
(function(){
  if(!CARIMAGES_KEY || CARIMAGES_KEY === "ci_your_key") return;
  window.CI_DEFAULT_TYPE = "any";
  window.CI_API_KEY = CARIMAGES_KEY;
  const s = document.createElement("script");
  s.async = 1;
  s.src = "https://carimagesapi.com/assets/js/carimages.js?v=" + new Date().toISOString().slice(0,10).replace(/-/g,"");
  document.head.appendChild(s);
})();

function monthsBetween(s, now=new Date()){
  if(!s||s.length!==8) return null;
  const d=new Date(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8));
  return (now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());
}

// demo-chips renderen
const demosEl = document.querySelector(".demos");
Object.entries(DEMO).forEach(([k,v])=>{
  const c=document.createElement("div");
  c.className="demoChip";
  c.textContent=`${v.main.merk[0]+v.main.merk.slice(1).toLowerCase()} ${v.main.handelsbenaming}`;
  c.onclick=()=>{ document.getElementById("plate").value=k; lookup(); };
  demosEl.appendChild(c);
});

async function lookup(){
  const k=cleanPlate(document.getElementById("plate").value);
  const out=document.getElementById("output");
  if(k.length<4){ out.innerHTML=msg("error","Vul een geldig kenteken in."); return; }
  setLoading(true);

  let main=null, fuel={}, isDemo=false, gearbox=null, apk=null, odo=null, recalls=null;

  // Demo-kenteken? Gebruik altijd de vaste demo-gegevens en sla de RDW-aanroep over,
  // zodat een demo niet per ongeluk een echte auto met hetzelfde kenteken ophaalt.
  if(DEMO[k]){
    main = DEMO[k].main; fuel = DEMO[k].fuel; gearbox = DEMO[k].gearbox || null; isDemo = true;
    apk = DEMO[k].apk || null; odo = DEMO[k].odo || null; recalls = DEMO[k].recalls || null;
  } else {
    try{
      const [mR,fR]=await Promise.all([
        fetch(`${RDW_MAIN}?kenteken=${k}`),
        fetch(`${RDW_FUEL}?kenteken=${k}`)
      ]);
      const m=await mR.json(); const f=await fR.json();
      if(m.length){ main=m[0]; fuel=f[0]||{}; }
    }catch(e){ /* netwerk geblokkeerd of geen resultaat */ }

    // extra RDW-datasets, allemaal met nette terugval (mogen null teruggeven)
    if(main){
      const [g, a, o, rc] = await Promise.all([
        fetchGearbox(main).catch(()=>null),
        fetchApkHistory(k).catch(()=>null),
        fetchOdometer(k).catch(()=>null),
        fetchRecalls(k).catch(()=>null)
      ]);
      gearbox = g; apk = a; odo = o; recalls = rc;
    }
  }

  setLoading(false);
  if(!main){ out.innerHTML=msg("error","Geen voertuig gevonden met dit kenteken. Controleer of je het goed hebt ingevoerd."); return; }
  LAST = { main, fuel, gearbox, apk, odo, recalls, isDemo, province: DEFAULT_PROV, km: null, asking: null, comps: ["",""] };
  rerender();
}

// hertekent het hele rapport op basis van de bewaarde staat in LAST
function rerender(){
  if(!LAST) return;
  const d = analyze(LAST.main, LAST.fuel, LAST.province, LAST.km, LAST.gearbox);
  d.apk = LAST.apk; d.odo = LAST.odo; d.recalls = LAST.recalls; d.asking = LAST.asking;
  const verdict = priceVerdict(LAST.asking, LAST.comps.map(c=>+String(c).replace(/[^0-9]/g,"")||0));
  document.getElementById("output").innerHTML = renderReport(d, LAST.isDemo, verdict);
  initDepChart();
}

// — invoer-handlers die de staat bijwerken en daarna hertekenen —
function onProvince(v){ LAST.province = v; rerender(); }
function onKm(v){ LAST.km = +String(v).replace(/[^0-9]/g,"") || null; rerender(); }
function onAsking(v){ LAST.asking = +String(v).replace(/[^0-9]/g,"") || null; rerender(); }
function onComp(i,v){ LAST.comps[i] = v; rerender(); }
function addComp(){ LAST.comps.push(""); rerender(); }

// Probeert de versnellingsbak op te halen via de typegoedkeurings-dataset.
// Koppelt via EEG uitvoeringscode. Mag leeg/null teruggeven zonder te breken.
async function fetchGearbox(v){
  const tg  = v.typegoedkeuringsnummer;
  const uit = v.uitvoering;            // EEG uitvoeringscode
  if(!tg && !uit) return null;

  // de exacte veldnamen kunnen per dataset afwijken, daarom proberen we
  // meerdere koppelingsstrategieën in volgorde van waarschijnlijkheid.
  const tries = [];
  if(tg && uit) tries.push(`?typegoedkeuringsnummer=${encodeURIComponent(tg)}&eeg_uitvoeringscode=${encodeURIComponent(uit)}`);
  if(tg && uit) tries.push(`?typegoedkeuringsnummer=${encodeURIComponent(tg)}&uitvoering=${encodeURIComponent(uit)}`);
  if(uit)       tries.push(`?eeg_uitvoeringscode=${encodeURIComponent(uit)}`);

  for(const q of tries){
    try{
      const r = await fetch(RDW_GEARBOX + q + "&$limit=1");
      const rows = await r.json();
      if(Array.isArray(rows) && rows.length){
        const g = interpretGearbox(rows[0]);
        if(g) return g;
      }
    }catch(e){ /* probeer volgende strategie */ }
  }
  return null;
}

// Vertaalt ruwe RDW-velden naar leesbare transmissie-tekst.
function interpretGearbox(row){
  const raw = (row.type_versnellingsbak || row.versnellingsbak || row.type || "").toString().toUpperCase();
  const aantal = row.aantal_versnellingen || row.versnellingen || null;
  let type = null;
  if(/AUTOM/.test(raw) || (raw==="A")) type = "Automaat";
  else if(/HAND|MANU/.test(raw) || (raw==="M")) type = "Handgeschakeld";
  else if(raw) type = raw.charAt(0) + raw.slice(1).toLowerCase();
  if(!type && !aantal) return null;
  return { type, aantal, raw };
}

// APK-historie: aantal keuringen en geconstateerde gebreken. Mag leeg/null teruggeven.
async function fetchApkHistory(kenteken){
  try{
    const r = await fetch(`${RDW_DEFECTS}?kenteken=${kenteken}&$order=meld_datum_door_keuringsinstantie DESC&$limit=50`);
    const rows = await r.json();
    if(!Array.isArray(rows) || !rows.length) return null;
    // tel keuringen (unieke data) en gebreken
    const data = {};
    rows.forEach(x => { const d = x.meld_datum_door_keuringsinstantie || "?"; data[d] = (data[d]||0)+1; });
    const keuringen = Object.keys(data).length;
    const totaalGebreken = rows.length;
    const laatste = Object.keys(data).sort().reverse()[0];
    return { keuringen, totaalGebreken, laatsteKeuring: laatste, perKeuring: Math.round(totaalGebreken/Math.max(1,keuringen)*10)/10 };
  }catch(e){ return null; }
}

// Tellerstandoordeel: zegt of de kilometerstanden logisch oplopen (fraudecheck).
async function fetchOdometer(kenteken){
  try{
    const r = await fetch(`${RDW_ODO}?kenteken=${kenteken}&$order=datum_tellerstandoordeel DESC&$limit=1`);
    const rows = await r.json();
    if(!Array.isArray(rows) || !rows.length) return null;
    const o = rows[0];
    const oordeel = (o.tellerstandoordeel || "").toString();
    return { oordeel, datum: o.datum_tellerstandoordeel || null };
  }catch(e){ return null; }
}

// Terugroepacties: of er openstaande recalls zijn. Voorzichtig: dataset-koppeling
// is niet altijd op kenteken; mag stilletjes falen.
async function fetchRecalls(kenteken){
  try{
    const r = await fetch(`${RDW_RECALL}?kenteken=${kenteken}&$limit=5`);
    const rows = await r.json();
    if(!Array.isArray(rows) || !rows.length) return null;
    return { aantal: rows.length };
  }catch(e){ return null; }
}

// Maakt de modelnaam geschikter voor de foto-matching van CarImages.
// RDW geeft vaak de volledige uitvoering ("320I", "A4 AVANT 2.0 TDI"); CarImages
// matcht beter op de modelfamilie. We mappen bekende gevallen en strippen ruis.
function cleanModelForPhoto(merk, model){
  if(!model) return "";
  const M = (merk||"").toUpperCase();
  let s = model.toUpperCase().trim();

  // merken waar het model uit "woord + cijfer" bestaat: hou beide woorden
  if(M === "TESLA"){
    const m = s.match(/MODEL\s?[3SXY]/);
    if(m) return m[0].replace(/MODEL\s?/, "MODEL ");
  }

  // merkspecifieke mappings van uitvoering → modelfamilie
  if(M === "BMW"){
    const m = s.match(/\b([1-8])\d{2}\b/) || s.match(/\b([1-8])\d{2}[A-Z]/);  // 320i, 116d, 530e…
    if(m) return `${m[1]} SERIES`;
    const x = s.match(/X\s?([1-7])/);
    if(x) return "X" + x[1];
  }
  if(M === "MERCEDES-BENZ" || M === "MERCEDES"){
    const m = s.match(/\b([ACEGS])\s?\d{2,3}\b/) || s.match(/\b([ACEGS])\d{2,3}[A-Z]?/);  // A180, C220…
    if(m) return `${m[1]}-CLASS`;
  }
  if(M === "AUDI"){
    const m = s.match(/\b([AQ]\d|RS\s?\d|S\d|TT|R8)\b/);  // A4, Q5, RS6, S3, TT…
    if(m) return m[0].replace(/\s/,"");
  }
  if(M === "VOLKSWAGEN"){
    const known = ["GOLF","POLO","PASSAT","TIGUAN","T-ROC","T-CROSS","TOURAN","ARTEON","CADDY","TRANSPORTER","ID.3","ID.4","ID.5"];
    for(const k of known) if(s.includes(k)) return k;
  }

  // algemeen: strip motor-/uitrustingsruis en pak het eerste betekenisvolle deel
  s = s.replace(/\b\d\.\d\b.*$/,"")                       // "2.0 TDI ..." eraf
       .replace(/\b(TDI|TSI|TFSI|HDI|DCI|CDI|HYBRID|PHEV|AUTOMAAT|AUT|VAN|AVANT|VARIANT|SPORTBACK|TOURING|ESTATE)\b.*$/,"")
       .trim();
  const first = s.split(/\s+/)[0];
  return first || model;
}

// Bouwt een Gaspedaal-zoek-URL gefilterd op merk, model en bouwjaar-marge.
// Stuurt de gebruiker naar vergelijkbare auto's die nu te koop staan.
function gaspedaalUrl(merk, modelFamilie, jaar){
  if(!merk) return "https://www.gaspedaal.nl/";
  const slug = s => s.toLowerCase()
    .replace(/[^a-z0-9]+/g, "-")   // spaties/tekens → koppelteken
    .replace(/^-+|-+$/g, "");
  const mk = slug(merk);
  const md = modelFamilie ? slug(modelFamilie) : "";
  let url = `https://www.gaspedaal.nl/${mk}`;
  if(md) url += `/${md}`;
  // bouwjaar-marge van ±2 jaar als filter
  if(jaar){
    const van = jaar - 2, tot = jaar + 2;
    url += `?bmin=${van}&bmax=${tot}`;
  }
  return url;
}

function analyze(v,f,province,km,gearbox){
  const apkM=monthsBetween(v.vervaldatum_apk);
  const apkValid=apkM!==null && apkM<0;
  const by=v.datum_eerste_toelating?+v.datum_eerste_toelating.slice(0,4):null;
  const age=by?new Date().getFullYear()-by:null;
  const kw=f.nettomaximumvermogen?+f.nettomaximumvermogen:null;
  const pk=kw?Math.round(kw*1.36):null;
  const mass=v.massa_ledig_voertuig?+v.massa_ledig_voertuig:null;
  const fuelT=(f.brandstof_omschrijving||"").toLowerCase();

  const flags=[];
  if(apkM!==null && !apkValid) flags.push(["danger","APK is verlopen — eerst keuren voordat je de weg op mag."]);
  else if(apkM!==null && apkM>-2) flags.push(["warn","APK verloopt binnen 2 maanden — reken op keuringskosten."]);
  if(v.wam_verzekerd==="Nee") flags.push(["warn","Niet WAM-verzekerd geregistreerd."]);
  if(age!==null && age>=15) flags.push(["warn",`Auto is ${age} jaar oud — let extra op roest, onderhoud en slijtage.`]);
  if(v.tenaamstellen_mogelijk==="Nee") flags.push(["danger","Tenaamstelling niet mogelijk volgens RDW — controleer de status."]);
  if(!flags.length) flags.push(["ok","Geen directe waarschuwingen gevonden in de RDW-data."]);

  return {
    plate:v.kenteken, title:`${v.merk||"?"} ${v.handelsbenaming||""}`.trim(),
    photoMake:v.merk||"", photoModel:cleanModelForPhoto(v.merk, v.handelsbenaming), photoYear:by||"",
    body:v.inrichting||"—", color:v.eerste_kleur||"—",
    buildDate:v.datum_eerste_toelating, buildYear:by, age,
    apkDate:v.vervaldatum_apk, apkValid,
    fuel:f.brandstof_omschrijving||"—", kw, pk, mass, fuelT,
    doors:v.aantal_deuren, seats:v.aantal_zitplaatsen,
    cylinders:f.aantal_cilinders, displacement:f.cilinderinhoud,
    consumption:f.brandstofverbruik_gecombineerd, co2:f.co2_uitstoot_gecombineerd,
    catalogPrice:v.catalogusprijs?+v.catalogusprijs:null,
    merk:(v.merk||"").toUpperCase().trim(), merkFactor:(MERK_FACTOR[(v.merk||"").toUpperCase().trim()] ?? 1.0),
    mrb:berekenMRB(mass,fuelT,province), province, km, gearbox, estValue:estValue(v,age,km),
    monthly:maandlasten(berekenMRB(mass,fuelT,province), fuelT, f.brandstofverbruik_gecombineerd, age, pk), flags
  };
}

// ── Brandstofprijzen (pas aan als de markt verandert) ──
const PRIJS = { benzine:2.05, diesel:2.00, lpg:0.90, stroom:0.30 }; // €/liter, stroom €/kWh
const KM_PER_JAAR = 13000;

// Schat de maandlasten: wegenbelasting + brandstof + ruwe verzekering.
function maandlasten(mrbKwartaal, fuel, verbruik100, age, pk){
  const mrbMaand = mrbKwartaal!==null ? Math.round(mrbKwartaal/3) : null;

  // brandstof per maand
  let brandstofMaand = null;
  const kmMaand = KM_PER_JAAR / 12;
  if(fuel.includes("elektric")){
    const kwh100 = 17; // gemiddeld verbruik EV
    brandstofMaand = Math.round((kmMaand/100) * kwh100 * PRIJS.stroom);
  } else if(verbruik100){
    let prijs = PRIJS.benzine;
    if(fuel.includes("diesel")) prijs = PRIJS.diesel;
    else if(fuel.includes("lpg")||fuel.includes("gas")) prijs = PRIJS.lpg;
    brandstofMaand = Math.round((kmMaand/100) * (+verbruik100) * prijs);
  }

  // verzekering: zeer ruwe WA+-indicatie o.b.v. leeftijd auto en vermogen
  let verzekeringMaand = null;
  if(age!==null){
    let basis = 55;
    if(pk){ if(pk>150) basis += 30; else if(pk>100) basis += 15; }
    if(age < 5) basis += 25;           // nieuwere auto = vaak allrisk, duurder
    else if(age > 12) basis -= 10;     // oude auto = vaak WA, goedkoper
    verzekeringMaand = Math.max(30, basis);
  }

  const totaal = [mrbMaand, brandstofMaand, verzekeringMaand].reduce((a,b)=> a + (b||0), 0);
  return { mrbMaand, brandstofMaand, verzekeringMaand, totaal };
}

// ── Provinciale opcenten 2026 (% van de hoofdsom) ──
const OPCENTEN = {
  "Noord-Holland":82.0, "Overijssel":82.1, "Groningen":82.1, "Zeeland":82.3,
  "Drenthe":86.0, "Limburg":88.6, "Flevoland":89.4, "Friesland":92.1,
  "Noord-Brabant":80.4, "Utrecht":97.1, "Gelderland":99.6, "Zuid-Holland":104.4
};
const DEFAULT_PROV = "Overijssel"; // Kampen ligt in Overijssel

// Hoofdsom benzine per KWARTAAL (rijksdeel 2026), per gewichtsklasse van 100 kg.
// Gekalibreerd op het officiële ijkpunt: benzine 1260 kg in Utrecht ≈ €494/kwartaal.
// Maatgevend gewicht = leeggewicht + 75 kg, naar boven afgerond op 100 kg.
function hoofdsomKwartaal(klasse){
  const stappen = (klasse - 900) / 100;       // stappen t.o.v. 900 kg
  return Math.max(20, 52 + stappen * 39.7);    // rijksdeel per kwartaal
}

// MRB per kwartaal incl. provinciale opcenten, of null
function berekenMRB(mass, fuel, provincie){
  if(!mass) return null;
  const maat = mass + 75;
  const klasse = Math.ceil(maat/100)*100;
  const hk = hoofdsomKwartaal(klasse);

  // brandstoftoeslag (per kwartaal, bovenop benzine-hoofdsom)
  let toeslag = 0;
  if(fuel.includes("diesel")) toeslag = hk*0.25 + (klasse/100)*5;
  else if(fuel.includes("lpg")||fuel.includes("gas")) toeslag = (klasse/100)*3;
  // elektrisch: sinds 2026 vol tarief (geen korting meer), geen extra toeslag

  const opcPct = (OPCENTEN[provincie] ?? OPCENTEN[DEFAULT_PROV]) / 100;
  return Math.round(hk*(1+opcPct) + toeslag);
}

function lookupProblems(merk, modelFamilie){
  if(!merk || !modelFamilie) return null;
  const key = `${merk.toUpperCase().trim()}|${modelFamilie.toUpperCase().trim()}`;
  return PROBLEMEN[key] || null;
}

// Realistische restwaarde-curve: hard verlies in de eerste jaren, daarna afvlakkend.
// Restwaarde als fractie van de nieuwprijs, per leeftijd in jaren.
function retainedFraction(age){
  const curve = [1.00, 0.82, 0.74, 0.67, 0.61, 0.56, 0.51, 0.47, 0.43, 0.40, 0.37, 0.34, 0.31, 0.29, 0.27];
  if(age <= 0) return 1.00;
  if(age < curve.length) return curve[age];
  return Math.max(0.12, 0.27 - (age - 14) * 0.012); // na 14 jr langzaam verder, bodem 12%
}

// Schat restwaarde op basis van nieuwprijs, leeftijd, km-stand en merk.
function estValue(v, age, km){
  const cat = v.catalogusprijs ? +v.catalogusprijs : null;
  if(!cat || age===null) return null;

  let factor = retainedFraction(age);

  // merkcorrectie
  const merk = (v.merk || "").toUpperCase().trim();
  const merkF = MERK_FACTOR[merk] ?? 1.0;
  factor *= merkF;

  // km-correctie: NL rijdt gemiddeld ~13.000 km/jaar.
  // minder dan verwacht → opwaarts, meer → neerwaarts (max ±20%)
  if(km && age > 0){
    const verwacht = age * 13000;
    const verschil = verwacht - km;            // positief = weinig gereden
    const corr = (verschil / verwacht) * 0.25; // schaal
    factor *= (1 + Math.max(-0.20, Math.min(0.20, corr)));
  }
  // restwaarde kan niet boven nieuwprijs uitkomen
  factor = Math.min(factor, 1.0);
  return Math.round((cat * factor) / 100) * 100;
}

// Oordeel over de vraagprijs t.o.v. ingevoerde vergelijkingsprijzen
function priceVerdict(askingPrice, compPrices){
  const valid = compPrices.filter(p => p > 0);
  if(!askingPrice || valid.length === 0) return null;
  const avg = valid.reduce((a,b)=>a+b,0) / valid.length;
  const diff = askingPrice - avg;
  const pct = (diff / avg) * 100;
  let verdict, tone;
  if(pct <= -8){ verdict = "Scherp geprijsd — onder het gemiddelde."; tone = "ok"; }
  else if(pct < 8){ verdict = "Marktconform — rond het gemiddelde."; tone = "warn"; }
  else { verdict = "Aan de dure kant — boven het gemiddelde."; tone = "danger"; }
  return { avg: Math.round(avg), diff: Math.round(diff), pct: Math.round(pct), verdict, tone, n: valid.length };
}

// Brengt alle signalen samen tot één koopadvies: doen / twijfel / niet doen.
// Eerlijk en uitlegbaar: elk signaal levert punten op met een leesbare reden.
function buyingAdvice(d, verdict){
  let score = 0;          // hoe hoger, hoe beter
  const plus = [];        // pluspunten
  const min = [];         // aandachtspunten
  let dealbreaker = false;

  // 1. Fraude / tellerstand (zwaarst wegend)
  if(d.odo && d.odo.oordeel){
    if(/onlogisch/i.test(d.odo.oordeel)){
      score -= 5; dealbreaker = true;
      min.push("Tellerstand is onlogisch — sterke aanwijzing voor fraude.");
    } else if(/logisch/i.test(d.odo.oordeel)){
      score += 2; plus.push("Kilometerstand loopt logisch op (geen tellerfraude bekend).");
    }
  }

  // 2. APK-status
  if(d.apkDate){
    if(d.apkValid === false){ score -= 2; min.push("APK is verlopen — eerst laten keuren."); }
    else if(d.apkValid){ score += 1; plus.push("APK is geldig."); }
  }

  // 3. APK-gebrekenhistorie
  if(d.apk && d.apk.perKeuring != null){
    if(d.apk.perKeuring >= 2){ score -= 2; min.push(`Relatief veel gebreken bij keuringen (gem. ${d.apk.perKeuring} per keuring).`); }
    else if(d.apk.perKeuring <= 0.7){ score += 1; plus.push("Weinig gebreken in de keuringshistorie."); }
  }

  // 4. Prijs t.o.v. vergelijk (alleen als ingevuld)
  if(verdict){
    if(verdict.pct <= -8){ score += 2; plus.push(`Scherp geprijsd: ${Math.abs(verdict.pct)}% onder vergelijkbare auto's.`); }
    else if(verdict.pct >= 8){ score -= 2; min.push(`Aan de dure kant: ${verdict.pct}% boven vergelijkbare auto's.`); }
    else { score += 1; plus.push("Vraagprijs is marktconform."); }
  }

  // 5. Leeftijd
  if(d.age != null){
    if(d.age >= 15){ score -= 1; min.push(`Auto is ${d.age} jaar oud — let op slijtage en roest.`); }
    else if(d.age <= 5){ score += 1; plus.push(`Relatief jonge auto (${d.age} jaar).`); }
  }

  // 6. Recalls
  if(d.recalls && d.recalls.aantal){ score -= 1; min.push(`Openstaande terugroepactie(s): vraag of die zijn uitgevoerd.`); }

  // 7. Betrouwbaarheid van het model
  const rel = lookupProblems(d.merk, d.photoModel);
  if(rel){
    if(rel.score >= 4){ score += 2; plus.push(`${d.merk?d.merk.charAt(0)+d.merk.slice(1).toLowerCase():"Dit model"} staat bekend als betrouwbaar.`); }
    else if(rel.score <= 2.5){ score -= 1; min.push("Dit model staat bekend om wat terugkerende problemen."); }
  }

  // 8. WAM / tenaamstelling uit de flags
  if(d.flags && d.flags.some(f=>f[0]==="danger")) { score -= 2; }

  // 9. Eerlijke prijsband op basis van de restwaardeschatting.
  // estValue = redelijke prijs (midden). Onder = koopje, boven = te duur.
  let priceBand = null;
  if(d.estValue){
    const fair = d.estValue;
    const onder = Math.round(fair * 0.90 / 100) * 100;   // hieronder = scherp
    const boven = Math.round(fair * 1.12 / 100) * 100;   // hierboven = te duur
    priceBand = { fair, onder, boven };

    if(d.asking){
      if(d.asking <= onder){ score += 2; plus.push(`Vraagprijs (€${nf(d.asking)}) ligt onder de richtprijs — scherp.`); }
      else if(d.asking <= boven){ score += 1; plus.push(`Vraagprijs (€${nf(d.asking)}) past binnen een redelijke marge.`); }
      else { score -= 2; min.push(`Vraagprijs (€${nf(d.asking)}) ligt boven wat deze auto waard is (± €${nf(fair)}).`); }
    }
  }

  // bepaal oordeel
  let label, tone, sub;
  if(dealbreaker || score <= -3){
    label = "Niet doen"; tone = "danger";
    sub = "Er zijn serieuze risico's. Loop deze auto liever voorbij of laat 'm grondig keuren voordat je iets beslist.";
  } else if(score >= 3){
    label = "Doen"; tone = "ok";
    sub = "Op basis van de beschikbare gegevens ziet dit er als een verstandige koop uit. Een technische keuring blijft slim.";
  } else {
    label = "Twijfelachtig"; tone = "warn";
    sub = "Geen duidelijke winnaar of afrader. Weeg de punten hieronder af en laat de auto keuren voor je beslist.";
  }

  // beperk tot de 3 sterkste punten van elke kant
  return { label, tone, sub, plus: plus.slice(0,3), min: min.slice(0,3), score, priceBand };
}

const nf = n => n.toLocaleString("nl-NL");

// Toont historie & checks: tellerstandoordeel (fraude), APK-gebreken, recalls.
// Laat alleen rijen zien waarvoor data bestaat; verschijnt niet als alles leeg is.
function renderHistory(d){
  const rows = [];

  // tellerstandoordeel (sterkste fraudesignaal)
  if(d.odo && d.odo.oordeel){
    const ok = /logisch/i.test(d.odo.oordeel) && !/onlogisch/i.test(d.odo.oordeel);
    const onlogisch = /onlogisch/i.test(d.odo.oordeel);
    const tone = onlogisch ? "danger" : (ok ? "ok" : "warn");
    const tekst = onlogisch
      ? "Tellerstand is ONLOGISCH — mogelijk mee geknoeid. Wees voorzichtig."
      : (ok ? "Tellerstand loopt logisch op — geen aanwijzing voor fraude." : `Tellerstandoordeel: ${d.odo.oordeel}`);
    rows.push(`<div class="flag ${tone}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span>${tekst}</span></div>`);
  }

  // recalls / terugroepacties
  if(d.recalls && d.recalls.aantal){
    rows.push(`<div class="flag warn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.7 18-8-14a2 2 0 0 0-3.4 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.7-3Z"/><path d="M12 9v4M12 17h.01"/></svg><span>Er ${d.recalls.aantal===1?"is":"zijn"} ${d.recalls.aantal} terugroepactie(s) bekend — vraag of die zijn uitgevoerd.</span></div>`);
  }

  // APK-gebrekenhistorie
  let apkInner = "";
  if(d.apk && d.apk.keuringen){
    apkInner = `
      <div class="costRow"><span>Aantal APK-keuringen (RDW)</span><strong>${d.apk.keuringen}</strong></div>
      <div class="costRow"><span>Totaal geconstateerde gebreken</span><strong>${d.apk.totaalGebreken}</strong></div>
      <div class="costRow"><span>Gemiddeld per keuring</span><strong>${d.apk.perKeuring}</strong></div>
      ${d.apk.laatsteKeuring?`<div class="costRow"><span>Laatste keuring</span><strong>${fmtDate(d.apk.laatsteKeuring)}</strong></div>`:""}`;
  }

  if(!rows.length && !apkInner) return "";  // niks bekend → blok weglaten

  return `<div class="valueBlock">
    <div class="costHead"><svg viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg> Historie &amp; checks</div>
    ${rows.join("")}
    ${apkInner}
    <p class="disclaimer">Gebaseerd op RDW-keuringsdata. Geen gebreken in deze lijst betekent niet automatisch dat de auto perfect is — laat 'm altijd technisch keuren voor aankoop.</p>
  </div>`;
}

// Tekent een SVG-lijngrafiek van de afschrijving over de jaren.
function renderDepreciationChart(d){
  const maxAge = Math.max(12, (d.age||0) + 5);
  const pts = [];
  for(let a=0; a<=maxAge; a++){
    const frac = Math.min(1, retainedFraction(a) * (d.merkFactor||1));
    pts.push({ age:a, frac, euro: d.catalogPrice ? Math.round(d.catalogPrice*frac) : null });
  }
  const W=320, H=150, padL=44, padR=12, padT=12, padB=26;
  const plotW = W-padL-padR, plotH = H-padT-padB;
  const maxFrac = pts[0].frac;
  const x = a => padL + (a/maxAge)*plotW;
  const y = f => padT + (1 - f/maxFrac)*plotH;
  const line = pts.map((p,i)=>`${i?'L':'M'}${x(p.age).toFixed(1)},${y(p.frac).toFixed(1)}`).join(" ");
  const area = `${line} L${x(maxAge).toFixed(1)},${padT+plotH} L${padL},${padT+plotH} Z`;
  const yLabels = [0, 0.5, 1].map(t=>{
    const f = t*maxFrac;
    const val = d.catalogPrice ? "€"+nf(Math.round(d.catalogPrice*f)) : Math.round(f*100)+"%";
    return `<text x="${padL-6}" y="${(y(f)+3).toFixed(1)}" text-anchor="end" font-size="9" fill="#8e8e93">${val}</text>`;
  }).join("");
  const xLabels = [0, Math.round(maxAge/2), maxAge].map(a=>
    `<text x="${x(a).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="9" fill="#8e8e93">${a}j</text>`).join("");

  // startpunt = huidige leeftijd (of 0)
  const startAge = (d.age!=null && d.age<=maxAge) ? d.age : 0;

  // geometrie + curve meegeven aan de drag-handler via data-attributen (JSON)
  const cfg = JSON.stringify({ maxAge, padL, padT, plotW, plotH, maxFrac, W, H,
    cat: d.catalogPrice||null, mf: d.merkFactor||1, startAge });

  return `<div class="valueBlock">
    <div class="costHead"><svg viewBox="0 0 24 24" fill="none" stroke="#0a84ff" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg> Afschrijving over de jaren</div>
    <div class="depReadout">
      <span class="depAge" id="depAge">${startAge} jaar oud</span>
      <span class="depVal" id="depVal">${d.catalogPrice?`± €${nf(Math.round(d.catalogPrice*pts[startAge].frac))}`:Math.round(pts[startAge].frac*100)+"%"}</span>
    </div>
    <svg id="depChart" data-cfg='${cfg}' viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;touch-action:none;cursor:pointer">
      <defs><linearGradient id="depg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a84ff" stop-opacity="0.25"/><stop offset="100%" stop-color="#0a84ff" stop-opacity="0"/></linearGradient></defs>
      <path d="${area}" fill="url(#depg)"/>
      <path d="${line}" fill="none" stroke="#0a84ff" stroke-width="2"/>
      <line id="depGuide" x1="${x(startAge).toFixed(1)}" y1="${padT}" x2="${x(startAge).toFixed(1)}" y2="${padT+plotH}" stroke="#0a84ff" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
      <circle id="depDot" cx="${x(startAge).toFixed(1)}" cy="${y(pts[startAge].frac).toFixed(1)}" r="6" fill="#0a84ff" stroke="#fff" stroke-width="2"/>
      ${yLabels}${xLabels}
    </svg>
    <p class="disclaimer">Sleep de stip over de lijn om de geschatte waarde op elke leeftijd te zien. Indicatie op basis van nieuwprijs en merk, geen taxatie.</p>
  </div>`;
}

// Maakt de afschrijvingsgrafiek interactief (slepen met de stip).
function initDepChart(){
  const svg = document.getElementById("depChart");
  if(!svg) return;
  const cfg = JSON.parse(svg.getAttribute("data-cfg"));
  const dot = document.getElementById("depDot");
  const guide = document.getElementById("depGuide");
  const ageEl = document.getElementById("depAge");
  const valEl = document.getElementById("depVal");
  const fracAt = a => Math.min(1, retainedFraction(a) * cfg.mf);
  const xOf = a => cfg.padL + (a/cfg.maxAge)*cfg.plotW;
  const yOf = f => cfg.padT + (1 - f/cfg.maxFrac)*cfg.plotH;

  function update(clientX){
    const rect = svg.getBoundingClientRect();
    // schaal schermpixels naar SVG-coördinaten (viewBox is W breed)
    const svgX = (clientX - rect.left) / rect.width * cfg.W;
    let a = (svgX - cfg.padL) / cfg.plotW * cfg.maxAge;
    a = Math.max(0, Math.min(cfg.maxAge, a));
    const aR = Math.round(a);              // hele jaren
    const f = fracAt(aR);
    const px = xOf(aR), py = yOf(f);
    dot.setAttribute("cx", px.toFixed(1));
    dot.setAttribute("cy", py.toFixed(1));
    guide.setAttribute("x1", px.toFixed(1));
    guide.setAttribute("x2", px.toFixed(1));
    ageEl.textContent = `${aR} jaar oud`;
    valEl.textContent = cfg.cat ? `± €${nf(Math.round(cfg.cat*f))}` : Math.round(f*100)+"%";
  }

  let dragging = false;
  const move  = e => { if(dragging) update((e.touches?e.touches[0]:e).clientX); };
  const end   = () => {
    dragging = false;
    window.removeEventListener("mousemove", move);
    window.removeEventListener("touchmove", move);
    window.removeEventListener("mouseup", end);
    window.removeEventListener("touchend", end);
  };
  const start = e => {
    dragging = true;
    update((e.touches?e.touches[0]:e).clientX);
    e.preventDefault();
    window.addEventListener("mousemove", move);
    window.addEventListener("touchmove", move, {passive:false});
    window.addEventListener("mouseup", end);
    window.addEventListener("touchend", end);
  };

  svg.addEventListener("mousedown", start);
  svg.addEventListener("touchstart", start, {passive:false});
}

  }
  return `<div class="valueBlock">
    <div class="costHead"><svg viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2"><path d="m12 2 2.4 7.4H22l-6 4.6 2.3 7.4-6.3-4.6L5.7 21l2.3-7.4-6-4.6h7.6z"/></svg> Betrouwbaarheid &amp; bekende problemen</div>

    <div class="valueBlock">
      <div class="costHead"><svg viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg> Maandlasten (schatting)</div>
      <div class="costRow"><span>Wegenbelasting</span><strong>${d.monthly.mrbMaand!==null?`€${nf(d.monthly.mrbMaand)}`:"—"}</strong></div>
      <div class="costRow"><span>Brandstof / energie</span><strong>${d.monthly.brandstofMaand!==null?`€${nf(d.monthly.brandstofMaand)}`:"onbekend"}</strong></div>
      <div class="costRow"><span>Verzekering (indicatie)</span><strong>${d.monthly.verzekeringMaand!==null?`€${nf(d.monthly.verzekeringMaand)}`:"—"}</strong></div>
      <div class="costRow totaalRow"><span><strong>Samen per maand</strong></span><strong>± €${nf(d.monthly.totaal)}</strong></div>
      <p class="disclaimer">Ruwe schatting bij ${nf(KM_PER_JAAR)} km/jaar en huidige brandstofprijzen. Verzekering hangt sterk af van je leeftijd, woonplaats en schadevrije jaren — dit is alleen een richtbedrag. Onderhoud en banden zijn niet meegerekend.</p>
    </div>
    <div class="valueBlock">
      <div class="costHead"><svg viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2">${iEuro}</svg> Geschatte restwaarde</div>
      <div class="provRow">
        <span>Kilometerstand (uit advertentie)</span>
        <input class="numInput" inputmode="numeric" placeholder="bijv. 145000" value="${LAST&&LAST.km?LAST.km:""}" onchange="onKm(this.value)">
        <strong class="print-only">${LAST&&LAST.km?nf(LAST.km)+" km":"—"}</strong>
      </div>
      <div class="costRow"><span>Indicatie waarde</span><strong>${d.estValue?`± €${nf(d.estValue)}`:"onbekend"}</strong></div>
      ${d.km?`<div class="costRow"><span>Meegewogen</span><strong>${nf(d.km)} km · ${d.age} jr</strong></div>`:""}
      <p class="disclaimer">${d.estValue?`Indicatie op basis van nieuwprijs, leeftijd${d.km?" en kilometerstand":""}. Dit is een schatting, geen taxatie en geen merkspecifieke koerslijst — gebruik het vergelijk hieronder voor de echte richtprijs.`:`Geen schatting mogelijk: de RDW heeft geen nieuwprijs voor deze auto (komt voor bij oudere of geïmporteerde auto's). Gebruik het prijsvergelijk hieronder.`}</p>
    </div>

    ${d.catalogPrice ? renderDepreciationChart(d) : ""}

    <div class="valueBlock">
      <div class="costHead"><svg viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg> Prijsvergelijk</div>
      <p class="compIntro">Vul de vraagprijs in van deze auto en van een paar vergelijkbare auto's. Tip: open Gaspedaal hieronder om de actuele prijzen van vergelijkbare auto's te zien.</p>
      <a class="gaspedaalBtn" href="${gaspedaalUrl(d.merk, d.photoModel, d.buildYear)}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        Bekijk vergelijkbare auto's op Gaspedaal
      </a>
      <div class="provRow">
        <span><strong>Vraagprijs deze auto</strong></span>
        <input class="numInput" inputmode="numeric" placeholder="€" value="${LAST&&LAST.asking?LAST.asking:""}" onchange="onAsking(this.value)">
        <strong class="print-only">${LAST&&LAST.asking?"€"+nf(LAST.asking):"—"}</strong>
      </div>
      <div class="compLabel">Vergelijkbare auto's (vraagprijs):</div>
      ${(LAST?LAST.comps:["",""]).map((c,i)=>`<div class="provRow"><span>Auto ${i+1}</span><input class="numInput" inputmode="numeric" placeholder="€" value="${c||""}" onchange="onComp(${i},this.value)"></div>`).join("")}
      <button class="addBtn" onclick="addComp()">+ nog een auto toevoegen</button>
      ${verdict?`
        <div class="flag ${verdict.tone}" style="margin-top:12px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${flagSvg[verdict.tone]}</svg>
          <span>${verdict.verdict}</span>
        </div>
        <div class="costRow"><span>Gemiddelde van ${verdict.n} ${verdict.n===1?"auto":"auto's"}</span><strong>€${nf(verdict.avg)}</strong></div>
        <div class="costRow"><span>Verschil met deze auto</span><strong>${verdict.diff>=0?"+":""}€${nf(verdict.diff)} (${verdict.pct>=0?"+":""}${verdict.pct}%)</strong></div>
      `:`<p class="disclaimer">Vul minstens de vraagprijs en één vergelijkbare auto in voor een oordeel.</p>`}
    </div>

    <button class="pdfBtn no-print" onclick="window.print()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg>
      Rapport opslaan als PDF
    </button>
    <p class="printHint no-print">Tip: kies bij "Bestemming" of "Printer" de optie <strong>Bewaar als PDF</strong>. Op iPhone: deel-icoon → Print → knijp open → deel als PDF.</p>
  </div>`;
}

function msg(type,text){
  const ic = type==="error" ? '<circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/>' : '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>';
  return `<div class="msg ${type}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${ic}</svg><span>${text}</span></div>`;
}

document.getElementById("plate").addEventListener("keydown",e=>{ if(e.key==="Enter")lookup(); });
</script>
</body>
</html>
