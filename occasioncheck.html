<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0b">
<title>OccasionCheck</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#000; color:#f2f2f7; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display',system-ui,sans-serif; padding:18px 16px 48px; -webkit-font-smoothing:antialiased; }
  .wrap { max-width:540px; margin:0 auto; }

  header { display:flex; align-items:center; gap:13px; margin-bottom:20px; padding-top:4px; }
  .logo { width:44px; height:44px; border-radius:12px; background:linear-gradient(160deg,#0a84ff,#0060df); display:grid; place-items:center; flex-shrink:0; box-shadow:0 4px 14px rgba(10,132,255,.35); }
  .logo svg { width:23px; height:23px; stroke:#fff; }
  h1 { font-size:24px; font-weight:700; letter-spacing:-.02em; }
  .tagline { font-size:13px; color:#8e8e93; margin-top:1px; }

  .searchRow { display:flex; gap:9px; margin-bottom:14px; }
  .plateWrap { flex:1; display:flex; align-items:stretch; background:#fff; border-radius:12px; overflow:hidden; }
  .plateFlag { background:#0a3d91; color:#fff; font-weight:700; font-size:12px; padding:0 11px; display:grid; place-items:center; letter-spacing:.05em; }
  #plate { flex:1; border:none; outline:none; padding:13px 12px; font-size:19px; font-weight:700; letter-spacing:.1em; color:#111; text-transform:uppercase; width:100%; }
  #plate::placeholder { color:#aeaeb2; font-weight:500; }
  .btn { display:flex; align-items:center; justify-content:center; gap:7px; background:#0a84ff; color:#fff; border:none; border-radius:12px; padding:0 20px; font-size:16px; font-weight:600; cursor:pointer; }
  .btn:active { background:#0060df; }
  .btn svg { width:18px; height:18px; stroke:#fff; }

  .demos { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:18px; }
  .demoChip { background:#1c1c1e; color:#0a84ff; font-size:13px; font-weight:500; padding:7px 13px; border-radius:18px; cursor:pointer; }
  .demoChip:active { background:#2c2c2e; }
  .demoLabel { font-size:12px; color:#8e8e93; width:100%; margin-bottom:3px; }

  .msg { display:flex; align-items:center; gap:9px; border-radius:13px; padding:14px 16px; font-size:14px; line-height:1.45; }
  .msg.error { background:#2c1517; color:#ff9aa0; }
  .msg.info { background:#1c1c1e; color:#aeaeb2; }
  .msg svg { width:18px; height:18px; flex-shrink:0; }

  .report { display:flex; flex-direction:column; gap:16px; margin-top:6px; }

  /* model foto */
  .carPhoto { width:100%; border-radius:16px; overflow:hidden; background:#1c1c1e; aspect-ratio:16/10; position:relative; display:flex; align-items:center; justify-content:center; }
  .carPhoto img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; }
  .carPhotoPlaceholder { width:64px; height:64px; }

  .reportHead { display:flex; justify-content:space-between; align-items:flex-start; gap:14px; flex-wrap:wrap; }
  .plateBadge { display:inline-flex; align-items:center; gap:7px; background:#fff; color:#111; font-weight:700; font-size:14px; border-radius:7px; overflow:hidden; margin-bottom:9px; padding-right:11px; letter-spacing:.08em; }
  .plateBadge .f { background:#0a3d91; color:#fff; font-size:11px; padding:5px 7px; }
  .carTitle { font-size:26px; font-weight:700; letter-spacing:-.02em; line-height:1.12; }
  .carSub { font-size:14px; color:#8e8e93; margin-top:4px; }
  .valueBox { display:flex; flex-direction:column; align-items:flex-end; background:#1c1c1e; border-radius:14px; padding:11px 15px; }
  .valueBox .l { font-size:11px; color:#8e8e93; }
  .valueBox .n { font-size:21px; font-weight:700; color:#0a84ff; margin:2px 0; }
  .valueBox .s { font-size:10px; color:#636366; }

  .flag { display:flex; align-items:center; gap:11px; border-radius:13px; padding:13px 15px; font-size:14px; line-height:1.4; }
  .flag svg { width:18px; height:18px; flex-shrink:0; }
  .flag.ok { background:#13301d; color:#5fd788; }
  .flag.warn { background:#2e2613; color:#ffd426; }
  .flag.danger { background:#2c1517; color:#ff6961; }

  .apkBlock { display:flex; align-items:center; gap:12px; border-radius:14px; padding:14px 16px; }
  .apkBlock svg { width:20px; height:20px; flex-shrink:0; }
  .apkBlock .d { font-size:13px; color:#8e8e93; margin-top:2px; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
  .spec { display:flex; align-items:center; gap:11px; background:#1c1c1e; border-radius:14px; padding:13px 14px; }
  .spec svg { width:17px; height:17px; stroke:#0a84ff; flex-shrink:0; }
  .spec .l { font-size:11.5px; color:#8e8e93; margin-bottom:2px; }
  .spec .v { font-size:14px; font-weight:600; }

  .costBlock, .valueBlock { background:#1c1c1e; border-radius:16px; padding:16px 18px; }
  .totaalRow { border-top:1px solid #38383a; margin-top:4px; padding-top:12px; font-size:16px; }
  .totaalRow strong { color:#30d158; }
  .provRow { display:flex; justify-content:space-between; align-items:center; padding:5px 0 11px; font-size:14px; gap:12px; }
  .provRow select { background:#2c2c2e; color:#f2f2f7; border:none; border-radius:9px; padding:9px 11px; font-size:14px; font-weight:500; -webkit-appearance:none; appearance:none; min-width:140px; }
  .numInput { background:#2c2c2e; color:#f2f2f7; border:none; border-radius:9px; padding:9px 11px; font-size:14px; font-weight:500; width:140px; text-align:right; outline:none; }
  .numInput::placeholder { color:#636366; }
  .numInput:focus { box-shadow:0 0 0 2px #0a84ff; }
  .compIntro { font-size:13px; color:#8e8e93; line-height:1.5; margin-bottom:13px; }
  .compLabel { font-size:12.5px; color:#8e8e93; margin:11px 0 5px; }
  .addBtn { background:transparent; color:#0a84ff; border:1px dashed #48484a; border-radius:10px; padding:11px; font-size:14px; font-weight:500; width:100%; cursor:pointer; margin-top:9px; }
  .addBtn:active { background:#2c2c2e; }
  .costHead { display:flex; align-items:center; gap:9px; font-weight:600; font-size:17px; margin-bottom:12px; letter-spacing:-.01em; }
  .costHead svg { width:18px; height:18px; stroke:#0a84ff; }
  .costRow { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-top:1px solid #2c2c2e; font-size:14px; }
  .disclaimer { font-size:11.5px; color:#636366; margin-top:12px; line-height:1.5; }

  .spin { animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .demoTag { display:inline-block; background:#3a2c4e; color:#d8b4fe; font-size:10px; font-weight:600; padding:2px 7px; border-radius:5px; margin-left:8px; vertical-align:middle; letter-spacing:.03em; }
  @media(max-width:480px){ .searchRow{flex-wrap:wrap} .btn{flex:1;padding:12px} }

  .pdfBtn { display:flex; align-items:center; justify-content:center; gap:9px; width:100%; margin-top:6px; background:#0a84ff; color:#fff; border:none; border-radius:13px; padding:15px; font-size:16px; font-weight:600; cursor:pointer; }
  .pdfBtn:active { background:#0060df; }
  .pdfBtn svg { width:18px; height:18px; }
  .printHint { font-size:11.5px; color:#6b7280; text-align:center; margin-top:8px; line-height:1.5; }
  .print-only { display:none; }

  /* ── Print / PDF weergave ── */
  @media print {
    body { background:#fff !important; color:#111 !important; padding:0 16px; }
    .no-print, .searchRow, .demos, header .tagline { display:none !important; }
    header { margin-bottom:8px; }
    h1 { color:#111 !important; }
    .report { gap:12px; }
    .costBlock, .valueBlock, .spec, .apkBlock, .flag, .plateBadge {
      background:#fff !important; border:1px solid #ccc !important; color:#111 !important;
      -webkit-print-color-adjust:exact; print-color-adjust:exact;
    }
    .carTitle, .carSub, .costHead, .spec .v, .spec .l, .costRow, .disclaimer, .compLabel, .compIntro { color:#111 !important; }
    .spec svg, .costHead svg { stroke:#444 !important; }
    .numInput, .addBtn, .provRow select { display:none !important; }
    .print-only { display:inline !important; color:#111 !important; }
    .demoTag { display:none !important; }
    .flag { border-left:4px solid #888 !important; }
    .carPhoto { max-height:200px; border:1px solid #ccc !important; }
    .totaalRow strong, .valueBox .n { color:#111 !important; }
    a, .pdfBtn { display:none !important; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.5"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.5 2.8C1.4 11.3 1 12.1 1 13v3c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg></div>
    <div>
      <h1>OccasionCheck</h1>
      <div class="tagline">Voer een kenteken in, krijg het hele plaatje.</div>
    </div>
  </header>

  <div class="searchRow">
    <div class="plateWrap">
      <div class="plateFlag">NL</div>
      <input id="plate" placeholder="XX-123-X" maxlength="8" autocomplete="off" autocapitalize="characters" spellcheck="false">
    </div>
    <button class="btn" onclick="lookup()" id="btn">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <span id="btnText">Check</span>
    </button>
  </div>

  <div class="demos">
    <span class="demoLabel">Demo-auto's (werken altijd):</span>
  </div>

  <div id="output">
    <div class="msg info">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
      <span>Tik een demo-auto hierboven, of typ een echt kenteken. Online werkt elk Nederlands kenteken via de RDW.</span>
    </div>
  </div>
</div>

<script>
const RDW_MAIN = "https://opendata.rdw.nl/resource/m9d7-ebf2.json";
const RDW_FUEL = "https://opendata.rdw.nl/resource/8ys7-d773.json";
const RDW_GEARBOX = "https://opendata.rdw.nl/resource/r7cw-67gs.json"; // Versnellingsbak Uitvoering
let LAST = null; // laatst opgehaalde voertuig, voor herberekening

// ── Demo-data: realistische voorbeelden zodat het offline werkt ──
const DEMO = {
  "GTSV21": {
    main: { kenteken:"GTSV21", merk:"VOLKSWAGEN", handelsbenaming:"GOLF", inrichting:"hatchback", eerste_kleur:"Grijs",
      datum_eerste_toelating:"20180312", vervaldatum_apk:"20260901", massa_ledig_voertuig:"1240",
      aantal_deuren:"5", aantal_zitplaatsen:"5", catalogusprijs:"28900", wam_verzekerd:"Ja", tenaamstellen_mogelijk:"Ja" },
    fuel: { brandstof_omschrijving:"Benzine", nettomaximumvermogen:"110", aantal_cilinders:"4",
      cilinderinhoud:"1498", brandstofverbruik_gecombineerd:"5.6", co2_uitstoot_gecombineerd:"128" },
    gearbox: { type:"Handgeschakeld", aantal:"6", raw:"M" }
  },
  "RJ482K": {
    main: { kenteken:"RJ482K", merk:"BMW", handelsbenaming:"320I", inrichting:"sedan", eerste_kleur:"Zwart",
      datum_eerste_toelating:"20060718", vervaldatum_apk:"20251015", massa_ledig_voertuig:"1450",
      aantal_deuren:"4", aantal_zitplaatsen:"5", catalogusprijs:"41500", wam_verzekerd:"Ja", tenaamstellen_mogelijk:"Ja" },
    fuel: { brandstof_omschrijving:"Benzine", nettomaximumvermogen:"110", aantal_cilinders:"4",
      cilinderinhoud:"1995", brandstofverbruik_gecombineerd:"7.9", co2_uitstoot_gecombineerd:"189" },
    gearbox: { type:"Automaat", aantal:"6", raw:"A" }
  },
  "HX991P": {
    main: { kenteken:"HX991P", merk:"TESLA", handelsbenaming:"MODEL 3", inrichting:"sedan", eerste_kleur:"Wit",
      datum_eerste_toelating:"20220505", vervaldatum_apk:"20260505", massa_ledig_voertuig:"1612",
      aantal_deuren:"4", aantal_zitplaatsen:"5", catalogusprijs:"52000", wam_verzekerd:"Ja", tenaamstellen_mogelijk:"Ja" },
    fuel: { brandstof_omschrijving:"Elektriciteit", nettomaximumvermogen:"208", aantal_cilinders:"0",
      cilinderinhoud:"", brandstofverbruik_gecombineerd:"", co2_uitstoot_gecombineerd:"0" },
    gearbox: { type:"Automaat", aantal:"1", raw:"A" }
  },
  "84TKDL": {
    main: { kenteken:"84TKDL", merk:"OPEL", handelsbenaming:"ASTRA", inrichting:"stationwagen", eerste_kleur:"Blauw",
      datum_eerste_toelating:"20090922", vervaldatum_apk:"20251130", massa_ledig_voertuig:"1320",
      aantal_deuren:"5", aantal_zitplaatsen:"5", catalogusprijs:"26400", wam_verzekerd:"Nee", tenaamstellen_mogelijk:"Ja" },
    fuel: { brandstof_omschrijving:"Diesel", nettomaximumvermogen:"81", aantal_cilinders:"4",
      cilinderinhoud:"1686", brandstofverbruik_gecombineerd:"4.8", co2_uitstoot_gecombineerd:"129" },
    gearbox: null
  }
};

const cleanPlate = s => s.toUpperCase().replace(/[^A-Z0-9]/g,"");
const fmtDate = s => (!s||s.length!==8) ? "—" : `${s.slice(6,8)}-${s.slice(4,6)}-${s.slice(0,4)}`;

// ── CarImages API: zet hier jouw gratis sleutel (begint met ci_) ──
// Haal 'm op bij https://carimagesapi.com/register en plak hieronder.
const CARIMAGES_KEY = "ci_your_key";  // <-- VERVANG door je eigen sleutel

// Laadt het CarImages-scriptje dat de modelfoto's automatisch invult.
// Doet niets zolang de sleutel nog op de voorbeeldwaarde staat.
(function(){
  if(!CARIMAGES_KEY || CARIMAGES_KEY === "ci_your_key") return;
  window.CI_DEFAULT_TYPE = "any";
  window.CI_API_KEY = CARIMAGES_KEY;
  const s = document.createElement("script");
  s.async = 1;
  s.src = "https://carimagesapi.com/assets/js/carimages.js?v=" + new Date().toISOString().slice(0,10).replace(/-/g,"");
  document.head.appendChild(s);
})();

function monthsBetween(s, now=new Date()){
  if(!s||s.length!==8) return null;
  const d=new Date(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8));
  return (now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());
}

// demo-chips renderen
const demosEl = document.querySelector(".demos");
Object.entries(DEMO).forEach(([k,v])=>{
  const c=document.createElement("div");
  c.className="demoChip";
  c.textContent=`${v.main.merk[0]+v.main.merk.slice(1).toLowerCase()} ${v.main.handelsbenaming}`;
  c.onclick=()=>{ document.getElementById("plate").value=k; lookup(); };
  demosEl.appendChild(c);
});

async function lookup(){
  const k=cleanPlate(document.getElementById("plate").value);
  const out=document.getElementById("output");
  if(k.length<4){ out.innerHTML=msg("error","Vul een geldig kenteken in."); return; }
  setLoading(true);

  let main=null, fuel={}, isDemo=false, gearbox=null;
  try{
    const [mR,fR]=await Promise.all([
      fetch(`${RDW_MAIN}?kenteken=${k}`),
      fetch(`${RDW_FUEL}?kenteken=${k}`)
    ]);
    const m=await mR.json(); const f=await fR.json();
    if(m.length){ main=m[0]; fuel=f[0]||{}; }
  }catch(e){ /* netwerk geblokkeerd → val terug op demo */ }

  // versnellingsbak: aparte (diepere) RDW-dataset, mag stilletjes falen
  if(main){
    try{ gearbox = await fetchGearbox(main); }catch(e){ gearbox = null; }
  }

  if(!main && DEMO[k]){ main=DEMO[k].main; fuel=DEMO[k].fuel; isDemo=true; gearbox = DEMO[k].gearbox || null; }

  setLoading(false);
  if(!main){ out.innerHTML=msg("error","Geen voertuig gevonden. Online werkt elk kenteken; offline alleen de demo-auto's hierboven."); return; }
  LAST = { main, fuel, gearbox, isDemo, province: DEFAULT_PROV, km: null, asking: null, comps: ["",""] };
  rerender();
}

// hertekent het hele rapport op basis van de bewaarde staat in LAST
function rerender(){
  if(!LAST) return;
  const d = analyze(LAST.main, LAST.fuel, LAST.province, LAST.km, LAST.gearbox);
  const verdict = priceVerdict(LAST.asking, LAST.comps.map(c=>+String(c).replace(/[^0-9]/g,"")||0));
  document.getElementById("output").innerHTML = renderReport(d, LAST.isDemo, verdict);
}

// — invoer-handlers die de staat bijwerken en daarna hertekenen —
function onProvince(v){ LAST.province = v; rerender(); }
function onKm(v){ LAST.km = +String(v).replace(/[^0-9]/g,"") || null; rerender(); }
function onAsking(v){ LAST.asking = +String(v).replace(/[^0-9]/g,"") || null; rerender(); }
function onComp(i,v){ LAST.comps[i] = v; rerender(); }
function addComp(){ LAST.comps.push(""); rerender(); }

// Probeert de versnellingsbak op te halen via de typegoedkeurings-dataset.
// Koppelt via EEG uitvoeringscode. Mag leeg/null teruggeven zonder te breken.
async function fetchGearbox(v){
  const tg  = v.typegoedkeuringsnummer;
  const uit = v.uitvoering;            // EEG uitvoeringscode
  if(!tg && !uit) return null;

  // de exacte veldnamen kunnen per dataset afwijken, daarom proberen we
  // meerdere koppelingsstrategieën in volgorde van waarschijnlijkheid.
  const tries = [];
  if(tg && uit) tries.push(`?typegoedkeuringsnummer=${encodeURIComponent(tg)}&eeg_uitvoeringscode=${encodeURIComponent(uit)}`);
  if(tg && uit) tries.push(`?typegoedkeuringsnummer=${encodeURIComponent(tg)}&uitvoering=${encodeURIComponent(uit)}`);
  if(uit)       tries.push(`?eeg_uitvoeringscode=${encodeURIComponent(uit)}`);

  for(const q of tries){
    try{
      const r = await fetch(RDW_GEARBOX + q + "&$limit=1");
      const rows = await r.json();
      if(Array.isArray(rows) && rows.length){
        const g = interpretGearbox(rows[0]);
        if(g) return g;
      }
    }catch(e){ /* probeer volgende strategie */ }
  }
  return null;
}

// Vertaalt ruwe RDW-velden naar leesbare transmissie-tekst.
function interpretGearbox(row){
  const raw = (row.type_versnellingsbak || row.versnellingsbak || row.type || "").toString().toUpperCase();
  const aantal = row.aantal_versnellingen || row.versnellingen || null;
  let type = null;
  if(/AUTOM/.test(raw) || (raw==="A")) type = "Automaat";
  else if(/HAND|MANU/.test(raw) || (raw==="M")) type = "Handgeschakeld";
  else if(raw) type = raw.charAt(0) + raw.slice(1).toLowerCase();
  if(!type && !aantal) return null;
  return { type, aantal, raw };
}

function setLoading(on){
  document.getElementById("btnText").textContent=on?"Bezig…":"Check";
  const b=document.getElementById("btn");
  b.querySelector("svg").style.display=on?"none":"block";
  if(on && !b.querySelector(".spin")){
    const s=document.createElement("span"); s.className="spin"; s.textContent="◌"; s.style.fontSize="18px";
    b.insertBefore(s,b.firstChild);
  } else if(!on){ const s=b.querySelector(".spin"); if(s)s.remove(); }
}

function analyze(v,f,province,km,gearbox){
  const apkM=monthsBetween(v.vervaldatum_apk);
  const apkValid=apkM!==null && apkM<0;
  const by=v.datum_eerste_toelating?+v.datum_eerste_toelating.slice(0,4):null;
  const age=by?new Date().getFullYear()-by:null;
  const kw=f.nettomaximumvermogen?+f.nettomaximumvermogen:null;
  const pk=kw?Math.round(kw*1.36):null;
  const mass=v.massa_ledig_voertuig?+v.massa_ledig_voertuig:null;
  const fuelT=(f.brandstof_omschrijving||"").toLowerCase();

  const flags=[];
  if(apkM!==null && !apkValid) flags.push(["danger","APK is verlopen — eerst keuren voordat je de weg op mag."]);
  else if(apkM!==null && apkM>-2) flags.push(["warn","APK verloopt binnen 2 maanden — reken op keuringskosten."]);
  if(v.wam_verzekerd==="Nee") flags.push(["warn","Niet WAM-verzekerd geregistreerd."]);
  if(age!==null && age>=15) flags.push(["warn",`Auto is ${age} jaar oud — let extra op roest, onderhoud en slijtage.`]);
  if(v.tenaamstellen_mogelijk==="Nee") flags.push(["danger","Tenaamstelling niet mogelijk volgens RDW — controleer de status."]);
  if(!flags.length) flags.push(["ok","Geen directe waarschuwingen gevonden in de RDW-data."]);

  return {
    plate:v.kenteken, title:`${v.merk||"?"} ${v.handelsbenaming||""}`.trim(),
    photoMake:v.merk||"", photoModel:v.handelsbenaming||"", photoYear:by||"",
    body:v.inrichting||"—", color:v.eerste_kleur||"—",
    buildDate:v.datum_eerste_toelating, buildYear:by, age,
    apkDate:v.vervaldatum_apk, apkValid,
    fuel:f.brandstof_omschrijving||"—", kw, pk, mass, fuelT,
    doors:v.aantal_deuren, seats:v.aantal_zitplaatsen,
    cylinders:f.aantal_cilinders, displacement:f.cilinderinhoud,
    consumption:f.brandstofverbruik_gecombineerd, co2:f.co2_uitstoot_gecombineerd,
    catalogPrice:v.catalogusprijs?+v.catalogusprijs:null,
    mrb:berekenMRB(mass,fuelT,province), province, km, gearbox, estValue:estValue(v,age,km),
    monthly:maandlasten(berekenMRB(mass,fuelT,province), fuelT, f.brandstofverbruik_gecombineerd, age, pk), flags
  };
}

// ── Brandstofprijzen (pas aan als de markt verandert) ──
const PRIJS = { benzine:2.05, diesel:2.00, lpg:0.90, stroom:0.30 }; // €/liter, stroom €/kWh
const KM_PER_JAAR = 13000;

// Schat de maandlasten: wegenbelasting + brandstof + ruwe verzekering.
function maandlasten(mrbKwartaal, fuel, verbruik100, age, pk){
  const mrbMaand = mrbKwartaal!==null ? Math.round(mrbKwartaal/3) : null;

  // brandstof per maand
  let brandstofMaand = null;
  const kmMaand = KM_PER_JAAR / 12;
  if(fuel.includes("elektric")){
    const kwh100 = 17; // gemiddeld verbruik EV
    brandstofMaand = Math.round((kmMaand/100) * kwh100 * PRIJS.stroom);
  } else if(verbruik100){
    let prijs = PRIJS.benzine;
    if(fuel.includes("diesel")) prijs = PRIJS.diesel;
    else if(fuel.includes("lpg")||fuel.includes("gas")) prijs = PRIJS.lpg;
    brandstofMaand = Math.round((kmMaand/100) * (+verbruik100) * prijs);
  }

  // verzekering: zeer ruwe WA+-indicatie o.b.v. leeftijd auto en vermogen
  let verzekeringMaand = null;
  if(age!==null){
    let basis = 55;
    if(pk){ if(pk>150) basis += 30; else if(pk>100) basis += 15; }
    if(age < 5) basis += 25;           // nieuwere auto = vaak allrisk, duurder
    else if(age > 12) basis -= 10;     // oude auto = vaak WA, goedkoper
    verzekeringMaand = Math.max(30, basis);
  }

  const totaal = [mrbMaand, brandstofMaand, verzekeringMaand].reduce((a,b)=> a + (b||0), 0);
  return { mrbMaand, brandstofMaand, verzekeringMaand, totaal };
}

// ── Provinciale opcenten 2026 (% van de hoofdsom) ──
const OPCENTEN = {
  "Noord-Holland":82.0, "Overijssel":82.1, "Groningen":82.1, "Zeeland":82.3,
  "Drenthe":86.0, "Limburg":88.6, "Flevoland":89.4, "Friesland":92.1,
  "Noord-Brabant":80.4, "Utrecht":97.1, "Gelderland":99.6, "Zuid-Holland":104.4
};
const DEFAULT_PROV = "Overijssel"; // Kampen ligt in Overijssel

// Hoofdsom benzine per KWARTAAL (rijksdeel 2026), per gewichtsklasse van 100 kg.
// Gekalibreerd op het officiële ijkpunt: benzine 1260 kg in Utrecht ≈ €494/kwartaal.
// Maatgevend gewicht = leeggewicht + 75 kg, naar boven afgerond op 100 kg.
function hoofdsomKwartaal(klasse){
  const stappen = (klasse - 900) / 100;       // stappen t.o.v. 900 kg
  return Math.max(20, 52 + stappen * 39.7);    // rijksdeel per kwartaal
}

// MRB per kwartaal incl. provinciale opcenten, of null
function berekenMRB(mass, fuel, provincie){
  if(!mass) return null;
  const maat = mass + 75;
  const klasse = Math.ceil(maat/100)*100;
  const hk = hoofdsomKwartaal(klasse);

  // brandstoftoeslag (per kwartaal, bovenop benzine-hoofdsom)
  let toeslag = 0;
  if(fuel.includes("diesel")) toeslag = hk*0.25 + (klasse/100)*5;
  else if(fuel.includes("lpg")||fuel.includes("gas")) toeslag = (klasse/100)*3;
  // elektrisch: sinds 2026 vol tarief (geen korting meer), geen extra toeslag

  const opcPct = (OPCENTEN[provincie] ?? OPCENTEN[DEFAULT_PROV]) / 100;
  return Math.round(hk*(1+opcPct) + toeslag);
}
// Merkfactor: corrigeert de gemiddelde curve per merk.
// Waardevaste merken > 1.0, snel afschrijvende merken < 1.0. Onbekend = 1.0.
const MERK_FACTOR = {
  // waardevast
  "TOYOTA":1.12, "LEXUS":1.12, "PORSCHE":1.15, "LAND ROVER":1.08, "SUZUKI":1.06,
  "VOLKSWAGEN":1.07, "DACIA":1.06, "MINI":1.06, "SUBARU":1.05, "MAZDA":1.04,
  "BMW":1.03, "MERCEDES-BENZ":1.03, "AUDI":1.03, "HONDA":1.04, "JEEP":1.03,
  "VOLVO":1.02, "KIA":1.02, "HYUNDAI":1.01, "SKODA":1.04, "SEAT":1.0,
  // gemiddeld rond 1.0 (niet vermeld = 1.0)
  // sneller afschrijvend
  "FORD":0.96, "OPEL":0.95, "RENAULT":0.93, "PEUGEOT":0.94, "CITROEN":0.92,
  "FIAT":0.90, "ALFA ROMEO":0.88, "NISSAN":0.97, "MITSUBISHI":0.95,
  "JAGUAR":0.85, "MASERATI":0.80, "TESLA":0.92
};

// Realistische restwaarde-curve: hard verlies in de eerste jaren, daarna afvlakkend.
// Restwaarde als fractie van de nieuwprijs, per leeftijd in jaren.
function retainedFraction(age){
  const curve = [1.00, 0.82, 0.74, 0.67, 0.61, 0.56, 0.51, 0.47, 0.43, 0.40, 0.37, 0.34, 0.31, 0.29, 0.27];
  if(age <= 0) return 1.00;
  if(age < curve.length) return curve[age];
  return Math.max(0.12, 0.27 - (age - 14) * 0.012); // na 14 jr langzaam verder, bodem 12%
}

// Schat restwaarde op basis van nieuwprijs, leeftijd, km-stand en merk.
function estValue(v, age, km){
  const cat = v.catalogusprijs ? +v.catalogusprijs : null;
  if(!cat || age===null) return null;

  let factor = retainedFraction(age);

  // merkcorrectie
  const merk = (v.merk || "").toUpperCase().trim();
  const merkF = MERK_FACTOR[merk] ?? 1.0;
  factor *= merkF;

  // km-correctie: NL rijdt gemiddeld ~13.000 km/jaar.
  // minder dan verwacht → opwaarts, meer → neerwaarts (max ±20%)
  if(km && age > 0){
    const verwacht = age * 13000;
    const verschil = verwacht - km;            // positief = weinig gereden
    const corr = (verschil / verwacht) * 0.25; // schaal
    factor *= (1 + Math.max(-0.20, Math.min(0.20, corr)));
  }
  // restwaarde kan niet boven nieuwprijs uitkomen
  factor = Math.min(factor, 1.0);
  return Math.round((cat * factor) / 100) * 100;
}

// Oordeel over de vraagprijs t.o.v. ingevoerde vergelijkingsprijzen
function priceVerdict(askingPrice, compPrices){
  const valid = compPrices.filter(p => p > 0);
  if(!askingPrice || valid.length === 0) return null;
  const avg = valid.reduce((a,b)=>a+b,0) / valid.length;
  const diff = askingPrice - avg;
  const pct = (diff / avg) * 100;
  let verdict, tone;
  if(pct <= -8){ verdict = "Scherp geprijsd — onder het gemiddelde."; tone = "ok"; }
  else if(pct < 8){ verdict = "Marktconform — rond het gemiddelde."; tone = "warn"; }
  else { verdict = "Aan de dure kant — boven het gemiddelde."; tone = "danger"; }
  return { avg: Math.round(avg), diff: Math.round(diff), pct: Math.round(pct), verdict, tone, n: valid.length };
}
