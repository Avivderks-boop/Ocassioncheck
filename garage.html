<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>MijnGarage</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#000; color:#f2f2f7; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif; padding:18px 16px 90px; -webkit-font-smoothing:antialiased; }
  .wrap { max-width:540px; margin:0 auto; }

  header { display:flex; align-items:center; gap:13px; margin-bottom:20px; padding-top:4px; }
  .logo { width:44px; height:44px; border-radius:12px; background:linear-gradient(160deg,#0a84ff,#0060df); display:grid; place-items:center; flex-shrink:0; box-shadow:0 4px 14px rgba(10,132,255,.35); }
  .logo svg { width:24px; height:24px; stroke:#fff; }
  h1 { font-size:24px; font-weight:700; letter-spacing:-.02em; }
  .tagline { font-size:13px; color:#8e8e93; margin-top:1px; }

  /* tabbladen onderaan */
  .tabbar { position:fixed; bottom:calc(14px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); width:calc(100% - 28px); max-width:480px; background:linear-gradient(180deg,#26262b,#161618); border:1px solid rgba(255,255,255,0.07); border-radius:22px; display:flex; justify-content:space-around; padding:9px 8px; z-index:50; box-shadow:0 10px 34px rgba(0,0,0,0.55), 0 0 0 1px rgba(10,132,255,0.10), inset 0 1px 0 rgba(255,255,255,0.05); }
  .tab { display:flex; flex-direction:column; align-items:center; gap:4px; color:#7c7c82; font-size:10.5px; font-weight:600; cursor:pointer; flex:1; padding:7px 0 5px; border-radius:15px; position:relative; transition:color .2s; }
  .tab svg { width:23px; height:23px; transition:transform .2s; }
  .tab.active { color:#0a84ff; background:rgba(10,132,255,0.12); }
  .tab.active svg { transform:translateY(-1px); }
  .tab.active::after { content:""; position:absolute; bottom:2px; width:16px; height:3px; border-radius:3px; background:#0a84ff; box-shadow:0 0 8px rgba(10,132,255,0.8); }
  /* extra ruimte onderaan zodat content niet achter de zwevende balk valt */
  .view { display:none; padding-bottom:96px; }
  .view.active { display:block; }

  /* auto-kaarten */
  .carCard { background:#1c1c1e; border-radius:16px; padding:16px; margin-bottom:13px; cursor:pointer; position:relative; overflow:hidden; }
  .carCard .plate { display:inline-flex; align-items:center; gap:6px; background:#f4d000; color:#111; font-weight:700; font-size:13px; border-radius:6px; overflow:hidden; padding-right:9px; letter-spacing:.07em; margin-bottom:9px; }
  .cardThumb { width:100%; height:140px; border-radius:12px; display:grid; place-items:center; margin-bottom:13px; overflow:hidden; background:#0d0d0f; }
  .cardThumb svg { width:60%; max-width:170px; }
  .cardThumb img { width:100%; height:100%; object-fit:cover; display:block; }
  .cardInfo { display:block; }
  .carCard .plate .f { background:#0a3d91; color:#fff; font-size:10px; padding:4px 6px; }
  .carCard .name { font-size:19px; font-weight:700; letter-spacing:-.01em; }
  .carCard .sub { font-size:13px; color:#8e8e93; margin-top:3px; }
  .carCard .badges { display:flex; gap:7px; flex-wrap:wrap; margin-top:12px; }
  .badge { font-size:11.5px; font-weight:600; padding:5px 9px; border-radius:8px; display:inline-flex; align-items:center; gap:5px; }
  .badge svg { width:13px; height:13px; }
  .badge.ok { background:#0f2e1a; color:#5fd788; }
  .badge.warn { background:#2e2613; color:#ffd426; }
  .badge.danger { background:#2c1517; color:#ff6961; }

  .addBtn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; background:#0a84ff; color:#fff; border:none; border-radius:13px; padding:15px; font-size:16px; font-weight:600; cursor:pointer; margin-top:6px; }
  .addBtn:active { background:#0060df; }
  .addBtn svg { width:18px; height:18px; stroke:#fff; }

  .empty { text-align:center; color:#8e8e93; padding:50px 20px; }
  .empty svg { width:54px; height:54px; stroke:#3a3a3c; margin-bottom:14px; }
  .empty p { font-size:14px; line-height:1.5; }

  /* modal voor toevoegen */
  .modal { position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); display:none; align-items:flex-end; z-index:100; }
  .modal.open { display:flex; }
  .sheet { background:#1c1c1e; width:100%; max-width:540px; margin:0 auto; border-radius:20px 20px 0 0; padding:22px 18px calc(22px + env(safe-area-inset-bottom)); animation:slideup .25s ease; max-height:88vh; overflow-y:auto; }
  @keyframes slideup { from { transform:translateY(100%); } to { transform:translateY(0); } }
  .sheet h2 { font-size:20px; font-weight:700; margin-bottom:16px; }
  .plateInput { display:flex; align-items:stretch; background:#f4d000; border-radius:11px; overflow:hidden; margin-bottom:13px; }
  .plateInput .f { background:#0a3d91; color:#fff; font-weight:700; font-size:13px; padding:0 12px; display:grid; place-items:center; letter-spacing:.05em; }
  .plateInput input { flex:1; border:none; outline:none; padding:15px 13px; font-size:20px; font-weight:700; letter-spacing:.12em; color:#111; text-transform:uppercase; width:100%; background:#f4d000; }
  .plateInput input::placeholder { color:#9a8500; }
  .sheetBtns { display:flex; gap:9px; margin-top:6px; }
  .sheetBtns button { flex:1; border:none; border-radius:11px; padding:14px; font-size:15px; font-weight:600; cursor:pointer; }
  .btnCancel { background:#2c2c2e; color:#f2f2f7; }
  .btnGo { background:#0a84ff; color:#fff; }
  .msg { font-size:13.5px; padding:11px 13px; border-radius:10px; margin-bottom:12px; display:none; }
  .msg.show { display:block; }
  .msg.err { background:#2c1517; color:#ff9aa0; }

  .spin { display:inline-block; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* detailscherm */
  .detail { position:fixed; inset:0; background:#000; z-index:80; overflow-y:auto; padding:14px 16px calc(40px + env(safe-area-inset-bottom)); display:none; }
  .detail.open { display:block; }
  .detailHead { margin-bottom:8px; }
  .backBtn { display:inline-flex; align-items:center; gap:3px; background:none; border:none; color:#0a84ff; font-size:17px; font-weight:500; cursor:pointer; padding:6px 0; }
  .backBtn svg { width:22px; height:22px; }
  .detailWrap { max-width:540px; margin:0 auto; }
  .dCarName { font-size:26px; font-weight:800; letter-spacing:-.02em; margin-top:6px; }
  .dCarSub { font-size:14px; color:#8e8e93; margin-top:4px; margin-bottom:6px; }

  .section { background:#1c1c1e; border-radius:16px; padding:16px; margin-top:14px; }
  .sectionHead { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .sectionHead .t { display:flex; align-items:center; gap:9px; font-size:16px; font-weight:700; }
  .sectionHead .t svg { width:18px; height:18px; }
  .miniAdd { background:#0a84ff; color:#fff; border:none; border-radius:8px; width:30px; height:30px; font-size:20px; line-height:1; cursor:pointer; display:grid; place-items:center; }
  .miniAdd:active { background:#0060df; }

  .item { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; padding:11px 0; border-top:1px solid #2c2c2e; }
  .item:first-of-type { border-top:none; }
  .item .l .it { font-size:14.5px; font-weight:600; }
  .item .l .is { font-size:12.5px; color:#8e8e93; margin-top:2px; }
  .item .r { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .item .amount { font-size:14.5px; font-weight:700; white-space:nowrap; }
  .item .due { font-size:12px; font-weight:600; padding:3px 8px; border-radius:7px; white-space:nowrap; }
  .due.ok { background:#0f2e1a; color:#5fd788; } .due.warn { background:#2e2613; color:#ffd426; } .due.danger { background:#2c1517; color:#ff6961; }
  .del { background:none; border:none; color:#5a5a5e; cursor:pointer; padding:2px; }
  .del svg { width:17px; height:17px; }
  .emptyMini { font-size:13px; color:#6a6a6e; padding:4px 0; }

  .totaalBar { display:flex; justify-content:space-between; align-items:baseline; border-top:1px solid #2c2c2e; margin-top:6px; padding-top:12px; }
  .totaalBar span { font-size:14px; color:#c7c7cc; } .totaalBar strong { font-size:19px; font-weight:700; color:#0a84ff; }

  .deleteCarBtn { width:100%; background:#2c1517; color:#ff6961; border:none; border-radius:13px; padding:14px; font-size:15px; font-weight:600; cursor:pointer; margin-top:18px; }
  .deleteCarBtn:active { background:#3a1a1c; }

  /* invoervelden in modal */
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:13px; color:#8e8e93; margin-bottom:6px; }
  .field input, .field select { width:100%; background:#2c2c2e; border:none; outline:none; border-radius:11px; padding:14px; font-size:16px; color:#f2f2f7; }
  .field input::placeholder { color:#6a6a6e; }

  /* specs-grid */
  .specGrid { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
  .specItem { background:#2c2c2e; border-radius:11px; padding:11px 13px; }
  .specItem .sl { font-size:11.5px; color:#8e8e93; }
  .specItem .sv { font-size:15px; font-weight:600; margin-top:3px; }

  /* hero-placeholder */
  .carHero { width:100%; height:210px; border-radius:16px; display:grid; place-items:center; overflow:hidden; position:relative; background:#0d0d0f; }
  .carHero svg { width:72%; max-width:280px; }
  .carHero img { width:100%; height:100%; object-fit:cover; display:block; }
  .fotoCheck { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.55); color:#e8e8ea; font-size:10.5px; text-align:center; padding:4px 8px; backdrop-filter:blur(4px); }
  .fotoEditBtn { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.55); color:#fff; border:none; border-radius:8px; padding:7px 11px; font-size:12.5px; font-weight:600; cursor:pointer; backdrop-filter:blur(4px); }
  .fotoEditBtn:active { background:rgba(0,0,0,0.75); }
  .fotoDelBtn { position:absolute; top:10px; left:10px; background:rgba(60,10,12,0.7); color:#ff8a80; border:none; border-radius:8px; padding:7px 11px; font-size:12.5px; font-weight:600; cursor:pointer; backdrop-filter:blur(4px); }
  .fotoDelBtn:active { background:rgba(80,15,18,0.85); }

  /* km-rij */
  .kmRow { display:flex; justify-content:space-between; align-items:center; background:#1c1c1e; border-radius:14px; padding:14px 16px; margin-top:14px; }
  .kmLabel { font-size:12px; color:#8e8e93; }
  .kmVal { font-size:17px; font-weight:700; margin-top:2px; }
  .kmBtn { background:#0a84ff; color:#fff; border:none; border-radius:9px; padding:9px 15px; font-size:14px; font-weight:600; cursor:pointer; }
  .kmBtn:active { background:#0060df; }

  /* waarde */
  .waardeBig { font-size:30px; font-weight:800; color:#60a5fa; letter-spacing:-.02em; }
  .koopRow { display:flex; align-items:center; gap:14px; }
  .koopCirkel { width:58px; height:58px; border-radius:50%; border:3px solid; display:grid; place-items:center; font-size:24px; font-weight:800; flex-shrink:0; }
  .koopLabel { font-size:18px; font-weight:700; }
  .koopSub { font-size:12.5px; color:#8e8e93; margin-top:2px; }
  /* tellerstand-banner */
  .odoBanner { border-radius:12px; padding:13px 15px; margin-bottom:4px; }
  .tellerBalk { display:flex; align-items:center; gap:13px; border-radius:14px; padding:15px 16px; margin-top:14px; }
  .tellerIcoon { font-size:24px; font-weight:800; flex-shrink:0; width:30px; text-align:center; }
  .tellerTitel { font-size:16px; font-weight:700; }
  .tellerUitleg { font-size:12.5px; color:#c7c7cc; margin-top:3px; line-height:1.45; }
  .odoTitel { font-size:15px; font-weight:700; }
  .odoUitleg { font-size:13px; color:#c7c7cc; margin-top:5px; line-height:1.45; }
  /* APK-historie */
  .apkSamenvatting { display:flex; flex-direction:column; gap:2px; background:#2c2c2e; border-radius:11px; padding:11px 13px; margin-bottom:12px; font-size:13px; }
  .apkSamenvatting span:first-child { font-weight:700; }
  .apkSamenvatting span:last-child { color:#8e8e93; font-size:12px; }
  .keuringItem { border-top:1px solid #2c2c2e; }
  .keuringItem:first-of-type { border-top:none; }
  .keuringItem summary { display:flex; justify-content:space-between; align-items:center; padding:12px 0; cursor:pointer; list-style:none; }
  .keuringItem summary::-webkit-details-marker { display:none; }
  .keuringDatum { font-size:14px; font-weight:600; }
  .keuringRight { display:flex; align-items:center; gap:9px; }
  .chev { width:16px; height:16px; color:#8e8e93; transition:transform .2s; }
  .keuringItem[open] .chev { transform:rotate(180deg); }
  .keuringGebreken { padding-bottom:10px; }
  .gebrek { display:flex; gap:9px; align-items:baseline; padding:4px 0; }
  .gebrekCode { font-size:12px; font-weight:700; color:#ff9f0a; background:#2e2613; border-radius:5px; padding:2px 7px; flex-shrink:0; min-width:34px; text-align:center; }
  .gebrekTekst { font-size:13.5px; color:#d8d8dc; line-height:1.4; }
  .gebrekGeen { font-size:13px; color:#34c759; padding:4px 0; }  .waardeSub { font-size:13px; color:#8e8e93; margin-top:4px; line-height:1.4; }

  /* zeldzaamheid */
  .zeldBig { font-size:40px; font-weight:800; color:#bf5af2; letter-spacing:-.03em; }
  .zeldSub { font-size:13.5px; color:#c7c7cc; margin-top:2px; }
  .zeldTekst { font-size:14px; font-weight:600; margin-top:10px; }

  /* klus-knoppen */
  .klusList { display:flex; flex-direction:column; gap:8px; }
  .klusBtn { display:flex; justify-content:space-between; align-items:center; gap:10px; background:#2c2c2e; border:none; border-radius:11px; padding:13px 14px; cursor:pointer; text-align:left; color:#f2f2f7; }
  .klusBtn:active { background:#3a3a3c; }
  .klusBtn span:first-child { font-size:14.5px; font-weight:600; }
  .klusMeta { font-size:11.5px; color:#8e8e93; white-space:nowrap; }

  /* klus-uitleg */
  .klusTags { display:flex; gap:8px; margin-bottom:14px; }
  .klusTag { background:#2c2c2e; color:#ff9f0a; font-size:12px; font-weight:600; padding:5px 10px; border-radius:8px; }
  .kostBox { background:#2c2c2e; border-radius:11px; padding:12px 14px; margin-bottom:13px; }
  .kostRij { display:flex; justify-content:space-between; align-items:baseline; padding:4px 0; font-size:14px; }
  .kostRij span { color:#c7c7cc; } .kostRij strong { font-size:15px; font-weight:700; }
  .videoBtn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; background:#2c1517; color:#ff453a; border:1px solid #ff453a; border-radius:11px; padding:13px; font-size:14.5px; font-weight:600; text-decoration:none; margin-bottom:18px; }
  .videoBtn:active { background:#3a1a1c; }
  .videoBtn svg { width:18px; height:18px; }
  .klusBlok { margin-bottom:16px; }
  .klusKop { font-size:13px; font-weight:700; color:#8e8e93; text-transform:uppercase; letter-spacing:.04em; margin-bottom:8px; }
  .klusBlok ul, .klusBlok ol { padding-left:20px; display:flex; flex-direction:column; gap:7px; }
  .klusBlok li { font-size:14.5px; line-height:1.45; }
  .klusWaarsch { font-size:12.5px; color:#8e8e93; line-height:1.5; background:#2c2613; padding:11px 13px; border-radius:10px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.2"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.5 2.8C1.4 11.3 1 12.1 1 13v3c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg></div>
    <div>
      <h1>MijnGarage</h1>
      <div class="tagline">Onderhoud, kosten en herinneringen voor je auto's. <span style="opacity:.4">v7</span></div>
    </div>
  </header>

  <!-- GARAGE -->
  <div class="view active" id="view-garage">
    <div id="carList"></div>
    <button class="addBtn" onclick="openAdd()">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14"/></svg>
      Auto toevoegen
    </button>
  </div>

  <!-- HERINNERINGEN -->
  <div class="view" id="view-reminders">
    <div id="reminderList"></div>
  </div>

  <!-- KOSTEN -->
  <div class="view" id="view-costs">
    <div id="costView"></div>
  </div>
</div>

<!-- tabbar -->
<div class="tabbar">
  <div class="tab active" data-view="garage" onclick="switchView('garage')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.5 2.8C1.4 11.3 1 12.1 1 13v3c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
    Garage
  </div>
  <div class="tab" data-view="reminders" onclick="switchView('reminders')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
    Herinneringen
  </div>
  <div class="tab" data-view="costs" onclick="switchView('costs')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    Kosten
  </div>
</div>

<!-- toevoeg-modal -->
<div class="modal" id="addModal">
  <div class="sheet">
    <h2>Auto toevoegen</h2>
    <div class="msg err" id="addMsg"></div>
    <div class="plateInput">
      <div class="f">NL</div>
      <input id="addPlate" placeholder="XX-123-X" maxlength="8" autocomplete="off" autocapitalize="characters" spellcheck="false">
    </div>
    <div class="sheetBtns">
      <button class="btnCancel" onclick="closeAdd()">Annuleren</button>
      <button class="btnGo" id="addGo" onclick="addCar()">Ophalen</button>
    </div>
  </div>
</div>

<!-- detailscherm -->
<div class="detail" id="detail">
  <div class="detailHead">
    <button class="backBtn" onclick="closeDetail()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
      Garage
    </button>
  </div>
  <div id="detailBody"></div>
</div>

<!-- invoer-modal (voor herinnering/onderhoud/kosten) -->
<div class="modal" id="entryModal">
  <div class="sheet">
    <h2 id="entryTitle">Toevoegen</h2>
    <div id="entryFields"></div>
    <div class="sheetBtns">
      <button class="btnCancel" onclick="closeEntry()">Annuleren</button>
      <button class="btnGo" onclick="saveEntry()">Opslaan</button>
    </div>
  </div>
</div>

<script>
const RDW_MAIN = "https://opendata.rdw.nl/resource/m9d7-ebf2.json";
const RDW_FUEL = "https://opendata.rdw.nl/resource/8ys7-d773.json";
const RDW_DEFECTS = "https://opendata.rdw.nl/resource/a34c-vvps.json"; // Geconstateerde Gebreken (APK)
const RDW_INSPECTIONS = "https://opendata.rdw.nl/resource/sgfe-77wx.json"; // Meldingen keuringsinstantie (alle keuringen)
const RDW_DEFECT_DESC = "https://opendata.rdw.nl/resource/hx2c-gt7k.json"; // omschrijving per gebrekcode
const RDW_ODO = "https://opendata.rdw.nl/resource/tcwd-fkw7.json";     // Tellerstandoordeel
const RDW_RECALL = "https://opendata.rdw.nl/resource/9levknx.json";   // terugroep (placeholder-koppeling)
const cleanPlate = s => s.toUpperCase().replace(/[^A-Z0-9]/g,"");
const fmtDate = s => (!s||s.length!==8) ? "—" : `${s.slice(6,8)}-${s.slice(4,6)}-${s.slice(0,4)}`;
const nf = n => n.toLocaleString("nl-NL");
const todayISO = () => new Date().toISOString().slice(0,10);

function monthsUntil(yyyymmdd){
  if(!yyyymmdd || yyyymmdd.length!==8) return null;
  const d = new Date(+yyyymmdd.slice(0,4), +yyyymmdd.slice(4,6)-1, +yyyymmdd.slice(6,8));
  const now = new Date();
  return (d - now) / (1000*60*60*24*30.4);
}

// ── opslag (localStorage: werkt in een los bestand én op GitHub Pages) ──
let CARS = [];
function loadCars(){
  try{ const v = localStorage.getItem("mijngarage_cars"); CARS = v ? JSON.parse(v) : []; }
  catch(e){ CARS = []; }
}
function saveCars(){

async function addCar(){
  const k = cleanPlate(document.getElementById("addPlate").value);
  const msg = document.getElementById("addMsg");
  if(k.length<4){ msg.textContent="Vul een geldig kenteken in."; msg.classList.add("show"); return; }
  if(CARS.some(c=>c.kenteken===k)){ msg.textContent="Deze auto staat al in je garage."; msg.classList.add("show"); return; }

  const go = document.getElementById("addGo");
  go.disabled = true;
  go.innerHTML = '<span class="spin">◌</span> Bezig…';
  try{
    const [mR, fR] = await Promise.all([
      fetch(`${RDW_MAIN}?kenteken=${k}`),
      fetch(`${RDW_FUEL}?kenteken=${k}`)
    ]);
    const rows = await mR.json();
    if(!rows.length){ msg.textContent="Geen voertuig gevonden met dit kenteken."; msg.classList.add("show"); go.disabled=false; go.textContent="Ophalen"; return; }
    const v = rows[0];
    let fuelRows = []; try{ fuelRows = await fR.json(); }catch(e){ fuelRows = []; }
    const f = fuelRows[0] || {};
    const kw = f.nettomaximumvermogen ? +f.nettomaximumvermogen : null;

    // brandstof netjes samenvoegen (hybride heeft meerdere regels)
    const brandstoffen = [...new Set(fuelRows.map(x=>x.brandstof_omschrijving).filter(Boolean))];
    let brandstofLabel = brandstoffen.join(" / ");
    const heeftBenzineOfDiesel = brandstoffen.some(b=>/benzine|diesel/i.test(b));
    const heeftElektrisch = brandstoffen.some(b=>/elektr/i.test(b));
    if(heeftBenzineOfDiesel && heeftElektrisch){
      const basis = brandstoffen.find(b=>/benzine|diesel/i.test(b));
      brandstofLabel = `Hybride (${basis.toLowerCase()}/elektrisch)`;
    } else if(brandstoffen.length===1 && heeftElektrisch){
      brandstofLabel = "Elektrisch";
    }

    // extra RDW-datasets ophalen (allemaal met nette terugval)
    let apk=null, odo=null, recalls=null;
    try{
      const [dR, oR, rcR, insR] = await Promise.all([
        fetch(`${RDW_DEFECTS}?kenteken=${k}&$order=meld_datum_door_keuringsinstantie DESC&$limit=200`).then(r=>r.json()).catch(()=>[]),
        fetch(`${RDW_ODO}?kenteken=${k}&$order=datum_tellerstandoordeel DESC&$limit=1`).then(r=>r.json()).catch(()=>[]),
        fetch(`${RDW_RECALL}?kenteken=${k}&$limit=5`).then(r=>r.json()).catch(()=>[]),
        fetch(`${RDW_INSPECTIONS}?kenteken=${k}&$order=meld_datum_door_keuringsinstantie DESC&$limit=50`).then(r=>r.json()).catch(()=>[])
      ]);
      // gebreken groeperen per keuringsdatum, met codes
      const gebrekenPerDatum = {};
      if(Array.isArray(dR)) dR.forEach(x=>{
        const d = x.meld_datum_door_keuringsinstantie || "?";
        const code = x.gebrek_identificatie || "";
        if(!gebrekenPerDatum[d]) gebrekenPerDatum[d] = [];
        if(code) gebrekenPerDatum[d].push(code);
      });
      // omschrijvingen ophalen voor de unieke codes
      const codes = Array.isArray(dR) ? [...new Set(dR.map(x=>x.gebrek_identificatie).filter(Boolean))] : [];
      const omschr = {};
      if(codes.length){
        try{
          const inList = codes.map(c=>`'${c}'`).join(",");
          const descR = await fetch(`${RDW_DEFECT_DESC}?$where=gebrek_identificatie in(${inList})&$limit=200`).then(r=>r.json()).catch(()=>[]);
          if(Array.isArray(descR)) descR.forEach(x=>{ if(x.gebrek_identificatie) omschr[x.gebrek_identificatie] = x.gebrek_omschrijving || ""; });
        }catch(e){ /* omschrijvingen optioneel */ }
      }
      // alle keuringsdatums verzamelen (uit meldingen + uit gebreken, voor de zekerheid)
      const alleDatums = new Set();
      if(Array.isArray(insR)) insR.forEach(x=>{ if(x.meld_datum_door_keuringsinstantie) alleDatums.add(x.meld_datum_door_keuringsinstantie); });
      Object.keys(gebrekenPerDatum).forEach(d=>{ if(d!=="?") alleDatums.add(d); });

      if(alleDatums.size){
        const lijst = [...alleDatums].sort().reverse().map(datum=>({
          datum,
          gebreken: (gebrekenPerDatum[datum] || []).map(code=>({ code, tekst: omschr[code] || "" }))
        }));
        const totaalGebreken = Array.isArray(dR) ? dR.length : 0;
        const keuringen = lijst.length;
        apk = { keuringen, totaalGebreken, perKeuring:Math.round(totaalGebreken/Math.max(1,keuringen)*10)/10, laatste:lijst[0].datum, lijst };
      }
      if(Array.isArray(oR) && oR.length){
        const row = oR[0];
        // RDW levert soms een code (00/03=logisch, 04=onlogisch, rest=geen oordeel) en soms tekst
        const ruw = (row.code_toelichting_tellerstandoordeel || row.tellerstandoordeel || row.toelichting_tellerstandoordeel || "").toString().trim();
        let oordeel = "";
        if(/^0?0$|^0?3$/.test(ruw) || /logisch/i.test(ruw) && !/onlogisch/i.test(ruw)) oordeel = "Logisch";
        else if(/^0?4$/.test(ruw) || /onlogisch/i.test(ruw)) oordeel = "Onlogisch";
        else if(ruw) oordeel = "Geen oordeel";
        odo = { oordeel, datum: row.datum_tellerstandoordeel || null };
      }
      if(Array.isArray(rcR) && rcR.length){ recalls = { aantal:rcR.length }; }
    }catch(e){ /* stil falen */ }

    CARS.push({
      kenteken: v.kenteken,
      merk: v.merk || "?",
      model: v.handelsbenaming || "",
      bouwjaar: v.datum_eerste_toelating ? v.datum_eerste_toelating.slice(0,4) : "",
      apk_datum: v.vervaldatum_apk || "",
      kleur: v.eerste_kleur || "",
      carrosserie: v.inrichting || "",
      brandstof: brandstofLabel,
      kw: kw,
      pk: kw ? Math.round(kw*1.36) : null,
      gewicht: v.massa_ledig_voertuig ? +v.massa_ledig_voertuig : null,
      zitplaatsen: v.aantal_zitplaatsen || "",
      datum_eerste_toelating: v.datum_eerste_toelating || "",
      catalogusprijs: v.catalogusprijs ? +v.catalogusprijs : null,
      cilinders: f.aantal_cilinders || "",
      cilinderinhoud: f.cilinderinhoud || "",
      deuren: v.aantal_deuren || "",
      wielbasis: v.wielbasis || "",
      trekgewicht: v.maximum_trekken_massa_geremd || "",
      verbruik: f.brandstofverbruik_gecombineerd || "",
      tweedevoertuigkleur: v.tweede_kleur && v.tweede_kleur!=="Niet geregistreerd" ? v.tweede_kleur : "",
      // RDW checks
      apkHist: apk, odo: odo, recalls: recalls,
      reminders: [],
      history: [],
      costs: [],
      km: null,
      foto: null  // eigen geüploade foto (verkleind, als data-URL)
    });
    const car = CARS[CARS.length-1];
    if(car.apk_datum){ car.reminders.push({ id:Date.now(), titel:"APK-keuring", datum:car.apk_datum }); }
    saveCars();
    closeAdd();
    renderGarage();
  }catch(e){
    msg.textContent="Kon de gegevens niet ophalen. Probeer opnieuw."; msg.classList.add("show"); go.disabled=false; go.textContent="Ophalen";
  }
}

// ── waarde-indicatie (zelfde curve-aanpak als de occasion-app) ──
function retainedFraction(age){
  const c=[1.00,0.82,0.74,0.67,0.61,0.56,0.51,0.47,0.43,0.40,0.37,0.34,0.31,0.29,0.27];
  if(age<=0) return 1; if(age<c.length) return c[age];
  return Math.max(0.12, 0.27-(age-14)*0.012);
}
const MERK_FACTOR = { "TOYOTA":1.12,"LEXUS":1.12,"PORSCHE":1.15,"VOLKSWAGEN":1.07,"DACIA":1.06,"MINI":1.06,"BMW":1.03,"MERCEDES-BENZ":1.03,"AUDI":1.03,"VOLVO":1.02,"SKODA":1.04,"FORD":0.96,"OPEL":0.95,"RENAULT":0.93,"PEUGEOT":0.94,"CITROEN":0.92,"FIAT":0.90,"TESLA":0.92 };

function schatWaarde(c){
  if(!c.catalogusprijs) return null;
  const age = c.bouwjaar ? new Date().getFullYear()-(+c.bouwjaar) : 0;
  let factor = retainedFraction(age) * (MERK_FACTOR[(c.merk||"").toUpperCase()] ?? 1.0);
  if(c.km && age>0){
    const verwacht = age*13000;
    const verschil = c.km - verwacht;
    factor *= (1 - Math.max(-0.15, Math.min(0.15, verschil/200000)));
  }
  return Math.max(500, Math.round(c.catalogusprijs*factor/50)*50);
}

function renderWaarde(c){
  const w = schatWaarde(c);
  if(!w) return "";
  return `<div class="section"><div class="sectionHead"><div class="t"><svg viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> Geschatte dagwaarde</div></div>
    <div class="waardeBig">± € ${nf(w)}</div>
    <div class="waardeSub">${c.km ? `Op basis van bouwjaar, merk en ${nf(c.km)} km.` : "Op basis van bouwjaar en merk. Voeg een kilometerstand toe voor een scherpere schatting."}</div>
    <p class="klusWaarsch" style="margin-top:12px">Dit is een ruwe schatting, geen taxatie of koerslijst. De echte waarde hangt af van staat, onderhoud en de markt.</p>
  </div>`;
}

async function renderZeldzaamheid(c){
  try{
    const q = `${RDW_MAIN}?$select=count(kenteken)&merk=${encodeURIComponent((c.merk||"").toUpperCase())}&handelsbenaming=${encodeURIComponent((c.model||"").toUpperCase())}&eerste_kleur=${encodeURIComponent(c.kleur||"")}`;
    const r = await fetch(q);
    const rows = await r.json();
    const totaal = rows && rows[0] ? +(rows[0].count_kenteken||rows[0].count||0) : 0;
    if(!totaal) return "";
    let tekst;
    if(totaal <= 50) tekst = "Zeldzaam! Hier rijden er maar weinig van rond.";
    else if(totaal <= 500) tekst = "Vrij uniek — je komt jezelf niet snel tegen.";
    else if(totaal <= 5000) tekst = "Redelijk gangbaar op de Nederlandse weg.";
    else tekst = "Een vertrouwd straatbeeld; hier rijden er veel van.";
    const kleurlabel = c.kleur ? c.kleur.toLowerCase()+" " : "";

      <div class="zeldBig">${nf(totaal)}</div>

// ── advertentietekst ──
function maakAdvertentie(c){
  const w = schatWaarde(c);
  const r = [];
  r.push(`${c.merk} ${c.model}${c.bouwjaar?` (${c.bouwjaar})`:""}`);
  r.push("");
  const specs = [];
  if(c.brandstof) specs.push(c.brandstof);
  if(c.pk) specs.push(`${c.pk} pk`);
  if(c.carrosserie) specs.push(c.carrosserie);
  if(c.kleur) specs.push(c.kleur.toLowerCase());
  if(c.km) specs.push(`${nf(c.km)} km`);
  if(specs.length) r.push(specs.join(" · "));
  r.push("");
  if(c.apk_datum){ r.push(`APK geldig tot ${fmtDate(c.apk_datum)}.`); }
  if(c.history && c.history.length){
    r.push(""); r.push("Recent onderhoud:");
    [...c.history].sort((a,b)=>(b.datum||"").localeCompare(a.datum||"")).slice(0,5).forEach(h=>{
      r.push(`- ${h.titel}${h.datum?` (${fmtDate2(h.datum)})`:""}`);
    });
  }
  r.push("");
  if(w) r.push(`Vraagprijs: in overleg (indicatie dagwaarde ± € ${nf(w)}).`);
  r.push("Altijd goed onderhouden. Bel of app voor een bezichtiging of proefrit.");
  return r.join("\n");
}
function openAdvertentie(){
  const c = CARS.find(x=>x.kenteken===CURRENT);
  const tekst = maakAdvertentie(c);
  document.getElementById("entryTitle").textContent = "Advertentietekst";
  document.getElementById("entryFields").innerHTML = `
    <p style="font-size:13px;color:#8e8e93;line-height:1.5;margin-bottom:12px">Klaar om te plakken op Marktplaats of AutoScout. Gemaakt uit je RDW-data en logboek.</p>
    <textarea id="advText" style="width:100%;min-height:240px;background:#2c2c2e;border:none;border-radius:11px;padding:14px;font-size:14px;color:#f2f2f7;line-height:1.5;font-family:inherit" readonly>${tekst.replace(/</g,"&lt;")}</textarea>`;
  const sheet = document.querySelector("#entryModal .sheetBtns");

function kopieerAdv(e){
  const t = document.getElementById("advText");
  t.select();
  try{ navigator.clipboard.writeText(t.value); }catch(err){ document.execCommand("copy"); }
  const btn = e.target; btn.textContent = "Gekopieerd!";
  setTimeout(()=>{ btn.textContent="Kopiëren"; }, 1500);
}

// ── koopscore: vat de RDW-signalen samen in een cijfer 1–10 ──
function koopScore(c){
  let score = 10;
  const minpunten = [];

  // APK-status
  const m = c.apk_datum ? monthsUntil(c.apk_datum) : null;
  if(m!==null){
    if(m < 0){ score -= 3; minpunten.push("APK is verlopen"); }
    else if(m < 1){ score -= 1; minpunten.push("APK verloopt zeer binnenkort"); }
    else if(m < 2){ minpunten.push("APK verloopt binnen 2 maanden"); }
  }

  // tellerstand
  if(c.odo && c.odo.oordeel){
    if(/onlogisch/i.test(c.odo.oordeel)){ score -= 4; minpunten.push("Tellerstand onlogisch (mogelijk mee geknoeid)"); }
  }

  // terugroepacties
  if(c.recalls && c.recalls.aantal){ score -= 1; minpunten.push(`${c.recalls.aantal} terugroepactie(s) bekend`); }

  // APK-gebreken per keuring
  if(c.apkHist && c.apkHist.keuringen){
    if(c.apkHist.perKeuring >= 4){ score -= 2; minpunten.push("Veel gebreken per APK-keuring"); }
    else if(c.apkHist.perKeuring >= 2){ score -= 1; minpunten.push("Gemiddeld aantal gebreken bij keuringen"); }
  }

  // leeftijd (zachte weging)
  const age = c.bouwjaar ? new Date().getFullYear()-(+c.bouwjaar) : 0;
  if(age >= 18){ score -= 1; minpunten.push("Hoge leeftijd"); }

  score = Math.max(1, Math.min(10, Math.round(score)));
  let label, kleur;
  if(score >= 9){ label="Uitstekend"; kleur="#34c759"; }
  else if(score >= 7){ label="Goed"; kleur="#9fd356"; }
  else if(score >= 5){ label="Redelijk"; kleur="#ffd426"; }
  else if(score >= 3){ label="Matig"; kleur="#ff9f0a"; }
  else { label="Let op"; kleur="#ff453a"; }

  return { score, label, kleur, minpunten };
}

function renderKoopscore(c){
  // alleen tonen als er RDW-signalen zijn om op te baseren
  if(!c.apk_datum && !c.odo && !c.apkHist) return "";
  const k = koopScore(c);
  const samenvatting = k.minpunten.length
    ? k.minpunten.map(p=>`<div class="item"><div class="l"><div class="it">${p}</div></div></div>`).join("")
    : `<div class="emptyMini" style="color:#34c759">Geen bijzonderheden gevonden in de RDW-data.</div>`;
  return `<div class="section"><div class="sectionHead"><div class="t"><svg viewBox="0 0 24 24" fill="none" stroke="${k.kleur}" stroke-width="2"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg> Koopscore</div></div>
    <div class="koopRow">
      <div class="koopCirkel" style="border-color:${k.kleur};color:${k.kleur}">${k.score}</div>
      <div><div class="koopLabel" style="color:${k.kleur}">${k.label}</div><div class="koopSub">op basis van beschikbare RDW-data</div></div>
    </div>
    <div style="margin-top:6px">${samenvatting}</div>
    <p class="klusWaarsch" style="margin-top:10px">De koopscore is een hulpmiddel op basis van open RDW-data, geen officieel oordeel. Laat een auto altijd keuren vóór aankoop.</p>
  </div>`;
}

// ── losse, duidelijke tellerstand-balk (logisch / onlogisch / geen oordeel) ──
function renderTellerstand(c){
  if(!c.odo || !c.odo.oordeel) return "";
  const onlogisch = /onlogisch/i.test(c.odo.oordeel);
  const logisch = /^logisch$/i.test(c.odo.oordeel) || (/logisch/i.test(c.odo.oordeel) && !onlogisch);
  const kleur = onlogisch ? "#ff453a" : (logisch ? "#34c759" : "#ffd426");
  const bg = onlogisch ? "#2c1517" : (logisch ? "#0f2e1a" : "#2e2613");
  const titel = onlogisch ? "Tellerstand onlogisch" : (logisch ? "Tellerstand logisch" : "Tellerstand: geen oordeel");
  const uitleg = onlogisch
    ? "Er is een stand geregistreerd die lager is dan een eerdere. Mogelijk teruggedraaid — wees voorzichtig."
    : (logisch ? "De geregistreerde standen lopen netjes oplopend op. Geen bijzonderheden." : "De RDW geeft (nog) geen oordeel over de tellerstanden van deze auto.");
  const icoon = onlogisch ? "⚠" : (logisch ? "✓" : "•");
  return `<div class="tellerBalk" style="background:${bg};border:1px solid ${kleur}40">
    <div class="tellerIcoon" style="color:${kleur}">${icoon}</div>
    <div><div class="tellerTitel" style="color:${kleur}">${titel}</div><div class="tellerUitleg">${uitleg}${c.odo.datum?` · laatste registratie ${fmtDate(c.odo.datum)}`:""}</div></div>
  </div>`;
}

function renderChecks(c){
  let html = "";

  // terugroepacties
  if(c.recalls && c.recalls.aantal){
    html += `<div class="item"><div class="l"><div class="it">${c.recalls.aantal} terugroepactie(s) bekend</div><div class="is">vraag of die zijn uitgevoerd</div></div><div class="r"><span class="due warn">let op</span></div></div>`;
  }

  if(!html) return "";
  return `<div class="section"><div class="sectionHead"><div class="t"><svg viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg> Historie &amp; checks</div></div>
    ${html}
    <p class="klusWaarsch" style="margin-top:10px">Op basis van RDW-keuringsdata. Geen gebreken betekent niet automatisch dat de auto perfect is — laat 'm altijd keuren voor aankoop.</p>
  </div>`;
}

// ── APK-historie: elke keuring uitklapbaar met de specifieke gebreken ──
function renderApkHistorie(c){
  if(!c.apkHist || !c.apkHist.keuringen) return "";
  const a = c.apkHist;
  const keuringHtml = (a.lijst || []).map((keuring, i)=>{
    const aantal = keuring.gebreken.length;
    const gebrekRegels = aantal
      ? keuring.gebreken.map(g=>`<div class="gebrek"><span class="gebrekCode">${g.code}</span><span class="gebrekTekst">${g.tekst || "omschrijving onbekend"}</span></div>`).join("")
      : `<div class="gebrekGeen">Geen gebreken genoteerd bij deze keuring.</div>`;
    const badge = aantal ? `<span class="due warn">${aantal} ${aantal===1?"gebrek":"gebreken"}</span>` : `<span class="due ok">goedgekeurd</span>`;
    // eerste keuring open, rest dichtgeklapt

      <summary><span class="keuringDatum">${fmtDate(keuring.datum)}</span><span class="keuringRight">${badge}<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg></span></summary>

  }).join("");
  return `<div class="section"><div class="sectionHead"><div class="t"><svg viewBox="0 0 24 24" fill="none" stroke="#34c759" stroke-width="2"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> APK-historie</div></div>
    <div class="apkSamenvatting"><span>${a.keuringen} keuringen in RDW</span><span>${a.totaalGebreken} gebreken totaal · gem. ${a.perKeuring} per keuring</span></div>
    ${keuringHtml}
  </div>`;
}

const KLEUR_HEX = { "zwart":"#1a1a1c","grijs":"#8a8a8e","wit":"#e8e8ea","blauw":"#2b5cb8","rood":"#c0392b","groen":"#278a4f","geel":"#e1c340","oranje":"#e08a2b","bruin":"#7a5a3a","beige":"#cdbfa3","zilver":"#c4c4c8","paars":"#7a4ea3","roze":"#d96fa8" };
function kleurHex(kleur){ if(!kleur) return "#3a3a3c"; const k=kleur.toLowerCase(); for(const naam in KLEUR_HEX){ if(k.includes(naam)) return KLEUR_HEX[naam]; } return "#3a3a3c"; }

// Haalt een modelfoto op van Wikimedia (gratis, geen watermerk). Mag null geven.
async function fetchWikiFoto(merk, model){
  if(!merk) return null;
  const termen = [
    `${merk} ${model}`.trim(),
    `${merk} ${(model||"").split(" ")[0]}`.trim(),
    merk
  ];
  for(const term of termen){
    try{
      const url = `https://commons.wikimedia.org/w/api.php?action=query&format=json&origin=*&generator=search&gsrnamespace=6&gsrsearch=${encodeURIComponent(term + " car")}&gsrlimit=5&prop=imageinfo&iiprop=url&iiurlwidth=640`;
      const r = await fetch(url);
      const data = await r.json();
      const pages = data?.query?.pages;
      if(pages){
        for(const id in pages){
          const info = pages[id].imageinfo && pages[id].imageinfo[0];
          if(info && info.thumburl && /\.(jpg|jpeg|png)$/i.test(info.thumburl)){
            return info.thumburl;
          }
        }
      }
    }catch(e){ /* probeer volgende term */ }
  }
  return null;
}

// laadt de Wikimedia-foto in de hero (alleen als er geen eigen foto is)
function laadHeroFoto(c){
  if(c.foto) return; // eigen foto staat er al
  fetchWikiFoto(c.merk, c.model).then(src=>{
    const slot = document.getElementById("carHeroSlot");
    if(slot && src && CURRENT===c.kenteken){
      slot.innerHTML = `<img src="${src}" alt="${c.merk} ${c.model}">
        <div class="fotoCheck">Voorbeeldfoto van dit model · niet per se deze auto</div>
        <button class="fotoEditBtn" onclick="kiesFoto()">+ Eigen foto</button>`;
      slot.style.padding = "0";
      slot.style.background = "#0d0d0f";
    }
  });
}

// eigen foto kiezen + verkleinen, dan opslaan bij de auto
function kiesFoto(){
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = "image/*";
  inp.onchange = () => {
    const file = inp.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        // verkleinen naar max 800px breed zodat de opslag niet volloopt
        const maxW = 800;
        const schaal = Math.min(1, maxW/img.width);
        const cv = document.createElement("canvas");
        cv.width = Math.round(img.width*schaal);
        cv.height = Math.round(img.height*schaal);
        cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
        const dataUrl = cv.toDataURL("image/jpeg", 0.8);
        const c = CARS.find(x=>x.kenteken===CURRENT);
        if(c){
          c.foto = dataUrl;
          try{ saveCars(); }catch(err){ alert("De foto is te groot voor de opslag. Probeer een kleinere foto."); c.foto=null; return; }
          renderDetail();
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

  const c = CARS.find(x=>x.kenteken===CURRENT);

    <div class="section"><div class="sectionHead"><div class="t"><svg viewBox="0 0 24 24" fill="none" stroke="#ffd426" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/></svg> Herinneringen</div><button class="miniAdd" onclick="openEntry('reminder')">+</button></div>${remHtml}</div>

    fields.innerHTML = `<div class="field"><label>Soort</label><select id="e_soort"><option>Tanken</option><option>Reparatie</option><option>Onderhoud</option><option>Verzekering</option><option>Wegenbelasting</option><option>APK</option><option>Banden</option><option>Anders</option></select></div><div class="field"><label>Bedrag</label><input id="e_bedrag" inputmode="numeric" placeholder="€"></div><div class="field"><label>Datum</label><input id="e_datum" type="date" value="${todayISO()}"></div>`;
  } else if(type==="km"){
    const c = CARS.find(x=>x.kenteken===CURRENT);
    title.textContent = "Kilometerstand";
    fields.innerHTML = `<div class="field"><label>Huidige kilometerstand</label><input id="e_km" inputmode="numeric" placeholder="bijv. 142000" value="${c&&c.km?c.km:""}"></div>`;
  }
  document.getElementById("entryModal").classList.add("open");
}
function closeEntry(){ document.getElementById("entryModal").classList.remove("open"); ENTRY_TYPE=null; }

function saveEntry(){
  const c = CARS.find(x=>x.kenteken===CURRENT);
  if(!c) return;
  const val = id => { const el=document.getElementById(id); return el?el.value.trim():""; };
  const num = id => +String(val(id)).replace(/[^0-9]/g,"")||0;
  if(ENTRY_TYPE==="reminder"){
    const titel=val("e_titel"), datum=val("e_datum");
    if(!titel || !datum){ alert("Vul wat en wanneer in."); return; }
    c.reminders.push({ id:Date.now(), titel, datum:datum.replace(/-/g,"") });
  } else if(ENTRY_TYPE==="history"){
    const titel=val("e_titel"), datum=val("e_datum");
    if(!titel || !datum){ alert("Vul in wat er gedaan is en wanneer."); return; }
    const bedrag=num("e_bedrag");
    c.history.push({ id:Date.now(), titel, datum, km:num("e_km")||null, bedrag:bedrag||null });
    if(bedrag) c.costs.push({ id:Date.now()+1, soort:"Onderhoud", bedrag, datum });
  } else if(ENTRY_TYPE==="cost"){
    const bedrag=num("e_bedrag"), datum=val("e_datum"), soort=val("e_soort")||"Anders";
    if(!bedrag){ alert("Vul een bedrag in."); return; }
    c.costs.push({ id:Date.now(), soort, bedrag, datum });
  } else if(ENTRY_TYPE==="km"){
    const km=num("e_km");
    if(!km){ alert("Vul een kilometerstand in."); return; }
    c.km = km;
  }
  saveCars(); closeEntry(); renderDetail();
}

function delReminder(id){ const c=CARS.find(x=>x.kenteken===CURRENT); c.reminders=c.reminders.filter(r=>r.id!==id); saveCars(); renderDetail(); }
function delHistory(id){ const c=CARS.find(x=>x.kenteken===CURRENT); c.history=c.history.filter(h=>h.id!==id); saveCars(); renderDetail(); }
function delCost(id){ const c=CARS.find(x=>x.kenteken===CURRENT); c.costs=c.costs.filter(co=>co.id!==id); saveCars(); renderDetail(); }

// ── garage weergave ──
function apkBadge(apk){
  const m = monthsUntil(apk);
  if(m===null) return `<span class="badge warn">APK onbekend</span>`;
  if(m < 0) return `<span class="badge danger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg>APK verlopen</span>`;
  if(m < 2) return `<span class="badge warn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>APK verloopt bijna</span>`;
  return `<span class="badge ok"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>APK ${fmtDate(apk)}</span>`;
}

function renderGarage(){
  const list = document.getElementById("carList");
  if(!CARS.length){
    list.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.5 2.8C1.4 11.3 1 12.1 1 13v3c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg><p>Nog geen auto's in je garage.<br>Voeg er een toe met het kenteken.</p></div>`;
    return;
  }
  list.innerHTML = CARS.map(c=>`
    <div class="carCard" onclick="openDetail('${c.kenteken}')">
      ${c.foto
        ? `<div class="cardThumb" style="padding:0"><img src="${c.foto}" alt="${c.merk} ${c.model}"></div>`
        : `<div class="cardThumb" id="thumb-${c.kenteken}" style="background:linear-gradient(160deg,${kleurHex(c.kleur)},${kleurHex(c.kleur)}cc)">
        <svg viewBox="0 0 120 50" fill="none" stroke="${['#e8e8ea','#cdbfa3','#c4c4c8','#e1c340'].includes(kleurHex(c.kleur))?'#444':'rgba(255,255,255,0.9)'}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"><path d="M8 36c0-2 1-3 3-3h2c1-5 3-9 6-11l4-8c1-2 3-3 5-3h28c3 0 6 2 8 4l8 11 18 3c4 1 7 4 7 8v3c0 2-1 3-3 3h-6"/><circle cx="30" cy="37" r="6"/><circle cx="88" cy="37" r="6"/></svg>
      </div>`}
      <div class="cardInfo">
        <div class="plate"><span class="f">NL</span>${c.kenteken}</div>
        <div class="name">${c.merk} ${c.model}</div>
        <div class="sub">${c.bouwjaar||"?"}${c.km?` · ${nf(c.km)} km`:""} · ${c.history.length} beurten</div>
        <div class="badges">${apkBadge(c.apk_datum)}</div>
      </div>
    </div>`).join("");

  // Wikimedia-foto's los inladen voor auto's zonder eigen foto (mag traag/falen)
  CARS.filter(c=>!c.foto).forEach(c=>{
    fetchWikiFoto(c.merk, c.model).then(src=>{
      const slot = document.getElementById(`thumb-${c.kenteken}`);
      if(slot && src){ slot.style.padding="0"; slot.innerHTML = `<img src="${src}" alt="${c.merk} ${c.model}">`; }
    });
  });
}

// ── herinneringen (alle auto's samen, op datum) ──
function renderReminders(){
  const view = document.getElementById("reminderList");
  const all = [];
  CARS.forEach(c=> (c.reminders||[]).forEach(r=> all.push({...r, auto:`${c.merk} ${c.model}`, kenteken:c.kenteken})));
  all.sort((a,b)=> (a.datum||"").localeCompare(b.datum||""));
  if(!all.length){
    view.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/></svg><p>Nog geen herinneringen.<br>Voeg een auto toe; de APK-datum komt er automatisch bij.</p></div>`;
    return;
  }
  view.innerHTML = all.map(r=>{
    const m = monthsUntil(r.datum);
    let tone = "ok";
    if(m!==null && m<0) tone="danger"; else if(m!==null && m<2) tone="warn";
    return `<div class="carCard" style="cursor:default">
      <div class="name" style="font-size:16px">${r.titel}</div>
      <div class="sub">${r.auto} · ${r.kenteken}</div>
      <div class="badges"><span class="badge ${tone}">${m!==null && m<0 ? "Verlopen op " : "Op "}${fmtDate(r.datum)}</span></div>
    </div>`;
  }).join("");
}

// ── kosten (overzicht per auto + totaal) ──
function renderCosts(){
  const view = document.getElementById("costView");
  if(!CARS.length){
    view.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><p>Nog geen auto's.<br>Voeg er een toe om kosten bij te houden.</p></div>`;
    return;
  }
  view.innerHTML = CARS.map(c=>{
    const totaal = (c.costs||[]).reduce((s,x)=>s+(+x.bedrag||0),0);
    return `<div class="carCard" style="cursor:default">
      <div class="name" style="font-size:16px">${c.merk} ${c.model}</div>
      <div class="sub">${c.kenteken}</div>
      <div class="badges"><span class="badge ${totaal>0?'warn':'ok'}">Totaal € ${nf(totaal)}</span></div>
    </div>`;
  }).join("");
}

document.getElementById("addPlate").addEventListener("keydown", e=>{ if(e.key==="Enter") addCar(); });

// start
loadCars(); renderGarage();
</script>
</body>
</html>
